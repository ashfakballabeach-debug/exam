<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Exam Portal</title>
    <style>
        :root { --primary: #2563eb; --secondary: #64748b; --accent: #f59e0b; --bg: #f8fafc; }
        body { font-family: 'Inter', system-ui, -apple-system, sans-serif; background-color: var(--bg); margin: 0; padding: 20px; display: flex; justify-content: center; min-height: 100vh; }
        
        .card { max-width: 650px; width: 100%; background: white; padding: 40px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }

        /* Student Dashboard Info Bar */
        .student-info-bar { 
            display: flex; justify-content: space-between; align-items: center; 
            background: #f1f5f9; padding: 12px 20px; border-radius: 12px; margin-bottom: 25px;
            border-left: 5px solid var(--primary);
        }
        .info-item span { display: block; font-size: 12px; color: var(--secondary); text-transform: uppercase; letter-spacing: 1px; }
        .info-item strong { font-size: 16px; color: #1e293b; }

        /* Inputs & Buttons */
        .input-box { margin-bottom: 15px; text-align: left; }
        input { width: 100%; padding: 14px; border: 1.5px solid #e2e8f0; border-radius: 8px; font-size: 16px; transition: 0.3s; }
        input:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1); }
        .btn-primary { width: 100%; padding: 16px; background: var(--primary); color: white; border: none; border-radius: 8px; font-size: 17px; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .btn-primary:hover { background: #1d4ed8; }

        /* Quiz Styling */
        #quiz-section { display: none; }
        .q-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 10px; }
        .q-text { font-size: 20px; font-weight: 700; color: #0f172a; margin-bottom: 20px; line-height: 1.5; }
        .options-grid { display: grid; gap: 12px; }
        .opt-btn { background: white; border: 1.5px solid #e2e8f0; padding: 16px; border-radius: 10px; cursor: pointer; text-align: left; font-size: 16px; transition: 0.2s; }
        .opt-btn:hover { background: #f8fafc; border-color: var(--primary); }
        .opt-btn.selected { background: var(--primary); color: white; border-color: var(--primary); }

        .progress-container { background: #e2e8f0; height: 6px; border-radius: 10px; margin-bottom: 30px; }
        #progress-bar { background: var(--primary); height: 100%; width: 0%; border-radius: 10px; transition: 0.4s; }

        #finish-screen { display: none; text-align: center; }
        .badge { display: inline-block; padding: 4px 12px; background: #dcfce7; color: #166534; border-radius: 20px; font-size: 12px; font-weight: bold; margin-bottom: 10px; }
    </style>
</head>
<body>

<!-- ലോഗിൻ സ്ക്രീൻ -->
<div class="card" id="login-section">
    <div style="text-align: center; margin-bottom: 30px;">
        <h2 style="margin: 0; color: #0f172a;">School Exam Portal</h2>
        <p style="color: var(--secondary);">വിവരങ്ങൾ നൽകി പരീക്ഷ ആരംഭിക്കുക</p>
    </div>
    <div class="input-box">
        <input type="text" id="student-name" placeholder="പൂർണ്ണമായ പേര് (Full Name)">
    </div>
    <div class="input-box">
        <input type="text" id="student-class" placeholder="ക്ലാസ്സ് (ഉദാ: 5-A)">
    </div>
    <button class="btn-primary" onclick="startExam()">START EXAMINATION</button>
</div>

<!-- പരീക്ഷാ സ്ക്രീൻ -->
<div class="card" id="quiz-section">
    <!-- Professional Info Bar -->
    <div class="student-info-bar">
        <div class="info-item">
            <span>STUDENT</span>
            <strong id="display-name">Name</strong>
        </div>
        <div class="info-item" style="text-align: right;">
            <span>CLASS</span>
            <strong id="display-class">Class</strong>
        </div>
    </div>

    <div class="q-header">
        <span style="font-weight: 600; color: var(--primary);" id="q-count">Question 1/10</span>
        <span id="timer" style="color: var(--accent); font-weight: bold;">00:00</span>
    </div>
    <div class="progress-container"><div id="progress-bar"></div></div>
    
    <div id="quiz-container"></div>
</div>

<!-- ഫിനിഷ് സ്ക്രീൻ -->
<div class="card" id="finish-screen">
    <span class="badge">COMPLETED</span>
    <h2 id="congrats-msg">അഭിനന്ദനങ്ങൾ!</h2>
    <p style="color: var(--secondary); margin-bottom: 30px;">നിങ്ങൾ പരീക്ഷ വിജയകരമായി പൂർത്തിയാക്കിയിരിക്കുന്നു.</p>
    <button class="btn-primary" onclick="location.reload()">CLOSE PORTAL</button>
</div>

<script>
    const questions = [
        { q: "1. കേരളത്തിലെ ഏറ്റവും വലിയ ജില്ല?", options: ["ഇടുക്കി", "പാലക്കാട്", "മലപ്പുറം", "വയനാട്"] },
        { q: "2. ഇന്ത്യയുടെ ദേശീയ പക്ഷി?", options: ["കുയിൽ", "മയിൽ", "തത്ത", "പ്രാവ്"] },
        { q: "3. 'രണ്ടാം കേരള സിംഹം' ആര്?", options: ["പഴശ്ശിരാജ", "വേലുത്തമ്പി ദളവ", "കുഞ്ഞാലി മരക്കാർ", "സി. വി. രാമൻ പിള്ള"] },
        { q: "4. സസ്യങ്ങൾ ആഹാരം നിർമ്മിക്കുന്ന പ്രക്രിയ?", options: ["ശ്വസനം", "പ്രകാശസംശ്ലേഷണം", "ബാഷ്പീകരണം", "വിസരണം"] },
        { q: "5. മലയാളത്തിലെ ആദ്യത്തെ നോവൽ?", options: ["ഇന്ദുലേഖ", "കുന്ദലത", "ശാരദ", "രാമരാജബഹദൂർ"] },
        { q: "6. സൂര്യപ്രകാശത്തിൽ നിന്നും ലഭിക്കുന്ന വിറ്റാമിൻ?", options: ["A", "C", "D", "B"] },
        { q: "7. ലോക പരിസ്ഥിതി ദിനം എന്ന്?", options: ["ജൂൺ 5", "ജൂലൈ 5", "ജൂൺ 15", "ജൂലൈ 15"] },
        { q: "8. ഇന്ത്യയുടെ ദേശീയ ഗാനം രചിച്ചത്?", options: ["ഗാന്ധിജി", "നെഹ്റു", "ടാഗോർ", "തിലകൻ"] },
        { q: "9. വായുവിൽ ഏറ്റവും കൂടുതലുള്ള വാതകം?", options: ["ഓക്സിജൻ", "നൈട്രജൻ", "ഹൈഡ്രജൻ", "കാർബൺ ഡയോക്സൈഡ്"] },
        { q: "10. കേരളത്തിന്റെ സംസ്ഥാന മൃഗം?", options: ["കടുവ", "ആന", "പശു", "മാൻ"] }
    ];

    let currentIdx = 0;
    let seconds = 0;
    let timerInterval;

    function startExam() {
        const name = document.getElementById('student-name').value;
        const sClass = document.getElementById('student-class').value;

        if (!name || !sClass) {
            alert("ദയവായി വിവരങ്ങൾ നൽകുക!");
            return;
        }

        document.getElementById('display-name').innerText = name;
        document.getElementById('display-class').innerText = sClass;
        document.getElementById('login-section').style.display = 'none';
        document.getElementById('quiz-section').style.display = 'block';
        
        startTimer();
        loadQuestion();
    }

    function startTimer() {
        timerInterval = setInterval(() => {
            seconds++;
            let mins = Math.floor(seconds / 60);
            let secs = seconds % 60;
            document.getElementById('timer').innerText = 
                `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }, 1000);
    }

    function loadQuestion() {
        if (currentIdx >= questions.length) {
            showFinish();
            return;
        }

        document.getElementById('q-count').innerText = `Question ${currentIdx + 1}/${questions.length}`;
        document.getElementById('progress-bar').style.width = (currentIdx / questions.length) * 100 + '%';

        const item = questions[currentIdx];
        document.getElementById('quiz-container').innerHTML = `
            <div class="q-text">${item.q}</div>
            <div class="options-grid">
                ${item.options.map(opt => `<button class="opt-btn" onclick="nextStep(this)">${opt}</button>`).join('')}
            </div>
        `;
    }

    function nextStep(btn) {
        btn.classList.add('selected');
        setTimeout(() => {
            currentIdx++;
            loadQuestion();
        }, 400);
    }

    function showFinish() {
        clearInterval(timerInterval);
        document.getElementById('quiz-section').style.display = 'none';
        document.getElementById('finish-screen').style.display = 'block';
        const name = document.getElementById('student-name').value;
        document.getElementById('congrats-msg').innerText = `Well Done, ${name}!`;
    }
</script>

</body>
</html>
