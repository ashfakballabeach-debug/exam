<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Exam Portal | Live Student Info</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1; --secondary: #a855f7; --bg: #0f172a;
            --card-bg: rgba(255, 255, 255, 0.05); --text: #f8fafc;
            --success: #10b981; --danger: #ef4444;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg);
            background-image: radial-gradient(circle at 20% 30%, rgba(99, 102, 241, 0.15) 0%, transparent 40%);
            margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; color: var(--text);
        }

        .glass-card {
            max-width: 750px; width: 100%; background: var(--card-bg);
            backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px; border-radius: 30px; box-shadow: 0 25px 50px rgba(0,0,0,0.4);
            animation: fadeIn 0.6s ease-out; text-align: center;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        h1 { font-size: 32px; font-weight: 800; background: linear-gradient(to right, #818cf8, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        input {
            width: 100%; padding: 16px; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px; color: white; font-size: 16px; margin-bottom: 15px; box-sizing: border-box;
        }
        .btn-main {
            width: 100%; padding: 18px; border: none; border-radius: 12px; background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white; font-weight: 700; cursor: pointer; transition: 0.3s; font-size: 16px;
        }

        /* Live Student Banner during Exam */
        .student-banner {
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(99, 102, 241, 0.1); border: 1px solid rgba(99, 102, 241, 0.2);
            padding: 12px 20px; border-radius: 15px; margin-bottom: 25px; text-align: left;
        }
        .student-banner div span { display: block; font-size: 10px; color: #94a3b8; text-transform: uppercase; font-weight: bold; }
        .student-banner div strong { font-size: 15px; color: #fff; }

        .sub-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 25px 0; }
        .sub-btn {
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 25px; border-radius: 20px; color: white; cursor: pointer; transition: 0.3s; font-weight: 600;
        }
        .sub-btn:disabled { opacity: 0.4; border-color: var(--success); }

        table { width: 100%; border-collapse: collapse; margin-top: 25px; background: rgba(255,255,255,0.02); border-radius: 15px; overflow: hidden; }
        th, td { padding: 18px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.05); }
        th { background: rgba(255,255,255,0.05); color: #94a3b8; font-size: 12px; text-transform: uppercase; }
        .btn-review { padding: 8px 15px; background: var(--primary); border: none; border-radius: 8px; color: white; cursor: pointer; font-size: 12px; font-weight: bold; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); z-index: 100; padding: 20px; overflow-y: auto; }
        .modal-card { max-width: 600px; margin: 40px auto; background: #1e293b; padding: 30px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.1); }
        .review-item { text-align: left; padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); }

        #login-screen, #subject-screen, #quiz-screen, #result-screen { display: none; }
    </style>
</head>
<body>

<!-- 1. LOGIN -->
<div class="glass-card" id="login-screen" style="display: block;">
    <h1>Elite Exam Portal</h1>
    <p>വിവരങ്ങൾ നൽകി പരീക്ഷ ആരംഭിക്കുക</p>
    <input type="text" id="s-name" placeholder="Student Name">
    <input type="text" id="s-class" placeholder="Class">
    <button class="btn-main" onclick="showSubjects()">START EXAMINATION</button>
</div>

<!-- 2. SUBJECT HUB -->
<div class="glass-card" id="subject-screen">
    <h2 id="welcome-msg">Dashboard</h2>
    <div class="sub-grid">
        <button class="sub-btn" id="btn-Malayalam" onclick="startQuiz('Malayalam')">Malayalam</button>
        <button class="sub-btn" id="btn-English" onclick="startQuiz('English')">English</button>
        <button class="sub-btn" id="btn-Maths" onclick="startQuiz('Maths')">Mathematics</button>
        <button class="sub-btn" id="btn-Science" onclick="startQuiz('Science')">Science</button>
        <button class="sub-btn" id="btn-Social" onclick="startQuiz('Social')">Social Studies</button>
    </div>
    <button id="final-res-btn" class="btn-main" style="display:none; background: var(--success);" onclick="showFinalResult()">VIEW REPORT CARD 📊</button>
</div>

<!-- 3. QUIZ (With Student Info Display) -->
<div class="glass-card" id="quiz-screen">
    <!-- Live Info Banner -->
    <div class="student-banner">
        <div><span>Candidate Name</span><strong id="live-name">---</strong></div>
        <div style="text-align: right;"><span>Class / Grade</span><strong id="live-class">---</strong></div>
    </div>

    <div style="display:flex; justify-content:space-between; margin-bottom:20px; font-weight:bold; color:var(--primary);">
        <span id="cur-sub-display">SUBJECT</span>
        <span id="q-counter">1/10</span>
    </div>
    <div id="quiz-container"></div>
</div>

<!-- 4. RESULT TABLE -->
<div class="glass-card" id="result-screen">
    <h1>Report Card</h1>
    <p id="student-meta" style="color:var(--primary); font-weight:bold;"></p>
    <table>
        <thead><tr><th>Subject</th><th>Score</th><th>Action</th></tr></thead>
        <tbody id="result-table-body"></tbody>
    </table>
    <div id="overall-status" style="margin-top:25px; font-weight:800; font-size:20px;"></div>
    <button class="btn-main" style="margin-top:20px; background:rgba(255,255,255,0.1);" onclick="location.reload()">LOGOUT</button>
</div>

<!-- REVIEW MODAL -->
<div class="modal" id="review-modal">
    <div class="modal-card">
        <h2 id="modal-title">Review</h2>
        <div id="modal-content"></div>
        <button class="btn-main" onclick="closeModal()">CLOSE REVIEW</button>
    </div>
</div>

<script>
    let student = { name: "", class: "" };
    let marks = {}; let userAnswers = {}; let currentSub = ""; let qIdx = 0;

    const questions = {
        'Malayalam': [
            { q: "മലയാളത്തിലെ ആദ്യ നോവൽ?", opts: ["ഇന്ദുലേഖ", "കുന്ദലത", "ശാരദ", "പാത്തുമ്മയുടെ ആട്"], a: "കുന്ദലത" },
            { q: "കേരളത്തിന്റെ മാമാങ്കം നടന്ന സ്ഥലം?", opts: ["തിരുനാവായ", "കൊച്ചി", "കോഴിക്കോട്", "പാലക്കാട്"], a: "തിരുനാവായ" },
            { q: "അക്ഷരമാലയിലെ ആദ്യ അക്ഷരം?", opts: ["അ", "ആ", "ക", "ഖ"], a: "അ" },
            { q: "കുമാരനാശാന്റെ പ്രസിദ്ധമായ കൃതി?", opts: ["വീണപൂവ്", "കൃഷ്ണഗാഥ", "രാമചരിതം", "നളചരിതം"], a: "വീണപൂവ്" },
            { q: "കേരളത്തിന്റെ ഔദ്യോഗിക ഭാഷ?", opts: ["മലയാളം", "തമിഴ്", "കന്നഡ", "ഹിന്ദി"], a: "മലയാളം" },
            { q: "ജ്ഞാനപീഠം ലഭിച്ച ആദ്യ മലയാളി?", opts: ["ജി. ശങ്കരക്കുറുപ്പ്", "എം.ടി", "തകഴി", "ബഷീർ"], a: "ജി. ശങ്കരക്കുറുപ്പ്" },
            { q: "മലയാള ഭാഷയുടെ പിതാവ്?", opts: ["എഴുത്തച്ഛൻ", "ചെറുശ്ശേരി", "കുഞ്ചൻ നമ്പ്യാർ", "പൂന്താനം"], a: "എഴുത്തച്ഛൻ" },
            { q: "മലയാളത്തിലെ ഏറ്റവും വലിയ അക്ഷരം?", opts: ["ക്ഷ", "ഹ", "റ", "ല"], a: "ക്ഷ" },
            { q: "ലക്ഷദ്വീപിലെ സംസാരഭാഷ?", opts: ["മലയാളം", "മഹൽ", "തമിഴ്", "ഹിന്ദി"], a: "മഹൽ" },
            { q: "മലയാളം സർവ്വകലാശാല എവിടെ?", opts: ["തിരൂർ", "കൊച്ചി", "കണ്ണൂർ", "കോട്ടയം"], a: "തിരൂർ" }
        ],
        'English': [
            { q: "Opposite of 'Happy'?", opts: ["Sad", "Joy", "Fast", "Angry"], a: "Sad" },
            { q: "Noun in 'The cat is sleeping'?", opts: ["Cat", "Sleeping", "The", "Is"], a: "Cat" },
            { q: "Plural of 'Tooth'?", opts: ["Teeth", "Tooths", "Teethes", "Toothies"], a: "Teeth" },
            { q: "Vowel count in 'Apple'?", opts: ["2", "3", "1", "0"], a: "2" },
            { q: "A person who treats patients?", opts: ["Doctor", "Teacher", "Pilot", "Farmer"], a: "Doctor" },
            { q: "Past tense of 'Go'?", opts: ["Went", "Gone", "Going", "Goes"], a: "Went" },
            { q: "Color of a leaf?", opts: ["Green", "Red", "Blue", "Black"], a: "Green" },
            { q: "Synonym of 'Start'?", opts: ["Begin", "End", "Stop", "Close"], a: "Begin" },
            { q: "Which is a fruit?", opts: ["Mango", "Carrot", "Potato", "Onion"], a: "Mango" },
            { q: "Animal with a long trunk?", opts: ["Elephant", "Lion", "Tiger", "Dog"], a: "Elephant" }
        ],
        'Maths': [
            { q: "10 x 5 = ?", opts: ["50", "40", "60", "100"], a: "50" },
            { q: "Square root of 64?", opts: ["8", "7", "6", "9"], a: "8" },
            { q: "Smallest prime number?", opts: ["2", "1", "3", "5"], a: "2" },
            { q: "15 + 25 = ?", opts: ["40", "30", "50", "45"], a: "40" },
            { q: "Angles in a triangle?", opts: ["3", "4", "2", "5"], a: "3" },
            { q: "100 / 4 = ?", opts: ["25", "20", "50", "10"], a: "25" },
            { q: "5 x 0 = ?", opts: ["0", "5", "1", "10"], a: "0" },
            { q: "Value of Pi (approx)?", opts: ["3.14", "2.14", "1.14", "4.14"], a: "3.14" },
            { q: "How many centimeters in 1 meter?", opts: ["100", "10", "1000", "50"], a: "100" },
            { q: "Next number: 2, 4, 6, 8, ...", opts: ["10", "12", "11", "9"], a: "10" }
        ],
        'Science': [
            { q: "Powerhouse of the cell?", opts: ["Mitochondria", "Nucleus", "Ribosome", "Wall"], a: "Mitochondria" },
            { q: "Water formula?", opts: ["H2O", "CO2", "O2", "NaCl"], a: "H2O" },
            { q: "Largest organ in the body?", opts: ["Skin", "Liver", "Heart", "Brain"], a: "Skin" },
            { q: "Gas we breathe in?", opts: ["Oxygen", "Nitrogen", "Hydrogen", "CO2"], a: "Oxygen" },
            { q: "Planet known as Red Planet?", opts: ["Mars", "Jupiter", "Venus", "Saturn"], a: "Mars" },
            { q: "Boiling point of water?", opts: ["100°C", "0°C", "50°C", "200°C"], a: "100°C" },
            { q: "Vitamin from Sunlight?", opts: ["Vitamin D", "Vitamin A", "Vitamin C", "Vitamin B"], a: "Vitamin D" },
            { q: "Force that pulls us to Earth?", opts: ["Gravity", "Friction", "Magnetic", "Electric"], a: "Gravity" },
            { q: "Number of bones in adult body?", opts: ["206", "300", "150", "250"], a: "206" },
            { q: "Largest mammal?", opts: ["Blue Whale", "Elephant", "Giraffe", "Shark"], a: "Blue Whale" }
        ],
        'Social': [
            { q: "First PM of India?", opts: ["Nehru", "Gandhi", "Ambedkar", "Azad"], a: "Nehru" },
            { q: "Father of Indian Constitution?", opts: ["Ambedkar", "Nehru", "Gandhi", "Patel"], a: "Ambedkar" },
            { q: "Capital of Kerala?", opts: ["Trivandrum", "Kochi", "Calicut", "Kannur"], a: "Trivandrum" },
            { q: "Independence Day?", opts: ["Aug 15", "Jan 26", "Oct 2", "Nov 14"], a: "Aug 15" },
            { q: "National Fruit of India?", opts: ["Mango", "Apple", "Banana", "Orange"], a: "Mango" },
            { q: "Largest Continent?", opts: ["Asia", "Africa", "Europe", "America"], a: "Asia" },
            { q: "State known as God's own country?", opts: ["Kerala", "Goa", "Punjab", "Assam"], a: "Kerala" },
            { q: "Highest mountain in world?", opts: ["Everest", "K2", "Anamudi", "Himalaya"], a: "Everest" },
            { q: "Currency of India?", opts: ["Rupee", "Dollar", "Yen", "Euro"], a: "Rupee" },
            { q: "National Animal?", opts: ["Tiger", "Lion", "Elephant", "Leopard"], a: "Tiger" }
        ]
    };

    function showSubjects() {
        student.name = document.getElementById('s-name').value;
        student.class = document.getElementById('s-class').value;
        if(!student.name || !student.class) return alert("Enter Student Details!");
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('subject-screen').style.display = 'block';
        document.getElementById('welcome-msg').innerText = `Hello, ${student.name}!`;
    }

    function startQuiz(sub) {
        currentSub = sub; qIdx = 0; marks[sub] = 0; userAnswers[sub] = [];
        document.getElementById('subject-screen').style.display = 'none';
        document.getElementById('quiz-screen').style.display = 'block';
        
        // Update Live Info Display
        document.getElementById('live-name').innerText = student.name;
        document.getElementById('live-class').innerText = student.class;
        document.getElementById('cur-sub-display').innerText = sub.toUpperCase();
        
        loadQ();
    }

    function loadQ() {
        const subQs = questions[currentSub];
        if(qIdx >= subQs.length) { finishSub(); return; }
        document.getElementById('q-counter').innerText = `${qIdx+1} / 10`;
        const item = subQs[qIdx];
        document.getElementById('quiz-container').innerHTML = `
            <div style="font-size:22px; font-weight:700; margin:25px 0; text-align:left;">${item.q}</div>
            <div style="display:grid; gap:12px;">
                ${item.opts.map(o => `<button class="sub-btn" style="padding:15px; text-align:left;" onclick="check('${o}')">${o}</button>`).join('')}
            </div>
        `;
    }

    function check(sel) {
        userAnswers[currentSub].push(sel);
        if(sel === questions[currentSub][qIdx].a) marks[currentSub]++;
        qIdx++; loadQ();
    }

    function finishSub() {
        document.getElementById('btn-' + currentSub).disabled = true;
        document.getElementById('quiz-screen').style.display = 'none';
        document.getElementById('subject-screen').style.display = 'block';
        if(Object.keys(marks).length === 5) document.getElementById('final-res-btn').style.display = 'block';
    }

    function showFinalResult() {
        document.getElementById('subject-screen').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        document.getElementById('student-meta').innerText = `${student.name} | ${student.class}`;
        let html = ""; let allPass = true;
        for(let s in questions) {
            let m = marks[s] || 0; if(m < 5) allPass = false;
            html += `<tr><td>${s}</td><td>${m}/10</td><td><button class="btn-review" onclick="openReview('${s}')">Review</button></td></tr>`;
        }
        document.getElementById('result-table-body').innerHTML = html;
        document.getElementById('overall-status').innerHTML = allPass ? "<span style='color:var(--success)'>QUALIFIED 🏆</span>" : "<span style='color:var(--danger)'>RE-ATTEMPT ❌</span>";
    }

    function openReview(sub) {
        document.getElementById('review-modal').style.display = 'block';
        document.getElementById('modal-title').innerText = `${sub} - Key`;
        let content = "";
        questions[sub].forEach((q, i) => {
            let uAns = userAnswers[sub][i]; let correct = q.a;
            content += `<div class="review-item">
                <div style="font-weight:700;">${i+1}. ${q.q}</div>
                <div style="font-size:14px; color:${uAns===correct?'var(--success)':'var(--danger)'}">Your: ${uAns}</div>
                ${uAns!==correct ? `<div style="font-size:14px; color:var(--success)">Correct: ${correct}</div>` : ""}
            </div>`;
        });
        document.getElementById('modal-content').innerHTML = content;
    }

    function closeModal() { document.getElementById('review-modal').style.display = 'none'; }
</script>

</body>
</html>
