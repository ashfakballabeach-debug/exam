<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexGen Exam Portal | Premium</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1; --secondary: #a855f7; --accent: #f59e0b;
            --bg: #030712; --card: rgba(255, 255, 255, 0.03);
            --success: #10b981; --danger: #ef4444; --text: #f8fafc;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg);
            background-image: radial-gradient(circle at 0% 0%, rgba(99, 102, 241, 0.1) 0%, transparent 50%),
                              radial-gradient(circle at 100% 100%, rgba(168, 85, 247, 0.1) 0%, transparent 50%);
            margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; color: var(--text);
        }

        .glass-card {
            max-width: 750px; width: 100%; background: var(--card);
            backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px; border-radius: 40px; box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            animation: slideIn 0.8s cubic-bezier(0.2, 1, 0.3, 1);
        }

        @keyframes slideIn { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        /* Typography */
        h1 { font-size: 36px; font-weight: 800; background: linear-gradient(to right, #818cf8, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 0 0 10px 0; }
        p { color: #94a3b8; font-size: 16px; }

        /* Forms & Buttons */
        .input-group { margin-bottom: 20px; text-align: left; }
        input {
            width: 100%; padding: 18px; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 18px; color: white; font-size: 16px; transition: 0.3s; box-sizing: border-box;
        }
        input:focus { border-color: var(--primary); background: rgba(255, 255, 255, 0.1); outline: none; }

        .btn-action {
            width: 100%; padding: 20px; border: none; border-radius: 20px; background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white; font-weight: 700; font-size: 18px; cursor: pointer; transition: 0.4s; margin-top: 10px;
        }
        .btn-action:hover { transform: scale(1.02); box-shadow: 0 15px 30px rgba(99, 102, 241, 0.4); }

        /* Subject Grid */
        .sub-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 30px 0; }
        .sub-btn {
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 30px 20px; border-radius: 24px; color: white; cursor: pointer; transition: 0.3s; font-weight: 700; text-align: center;
        }
        .sub-btn:hover:not(:disabled) { background: rgba(255, 255, 255, 0.08); border-color: var(--primary); transform: translateY(-5px); }
        .sub-btn:disabled { opacity: 0.4; border-color: var(--success); cursor: not-allowed; }

        /* Progress & Timer */
        .stat-pill { background: rgba(255, 255, 255, 0.05); padding: 10px 20px; border-radius: 50px; border: 1px solid rgba(255, 255, 255, 0.1); font-size: 14px; font-weight: 600; }
        .q-text { font-size: 24px; font-weight: 700; margin: 30px 0; text-align: left; line-height: 1.4; color: #f1f5f9; }

        /* Result Dashboard Styling */
        .result-row { 
            background: rgba(255,255,255,0.03); padding: 20px; border-radius: 24px; margin-bottom: 15px;
            display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(255,255,255,0.05);
        }
        .res-info { text-align: left; }
        .res-sub { font-weight: 700; font-size: 18px; color: #f8fafc; margin-bottom: 5px; display: block; }
        .res-bar-bg { width: 150px; height: 8px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; }
        .res-bar-fill { height: 100%; background: var(--primary); transition: 1s ease; }
        .btn-review { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #cbd5e1; padding: 10px 18px; border-radius: 12px; cursor: pointer; font-size: 13px; font-weight: 600; }
        .btn-review:hover { background: var(--primary); color: white; }

        /* Modal Review */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); z-index: 999; padding: 20px; overflow-y: auto; }
        .modal-body { max-width: 650px; margin: 40px auto; background: #0f172a; padding: 40px; border-radius: 32px; border: 1px solid rgba(255,255,255,0.1); }
        .review-box { background: rgba(255,255,255,0.03); padding: 20px; border-radius: 18px; margin-bottom: 15px; text-align: left; }
        
        #login-screen, #subject-screen, #quiz-screen, #result-screen { display: none; }
    </style>
</head>
<body>

<!-- 1. LOGIN -->
<div class="glass-card" id="login-screen" style="display: block;">
    <div style="font-size: 50px; margin-bottom: 20px;">⚡</div>
    <h1>NexGen Exam</h1>
    <p>Premium Student Assessment Portal</p>
    <div class="input-group">
        <input type="text" id="s-name" placeholder="Enter Full Name">
    </div>
    <div class="input-group">
        <input type="text" id="s-class" placeholder="Enter Class">
    </div>
    <button class="btn-action" onclick="showSubjects()">AUTHORIZE & START</button>
</div>

<!-- 2. SUBJECT HUB -->
<div class="glass-card" id="subject-screen">
    <h1 id="welcome-msg">Dashboard</h1>
    <p>Choose a subject to begin your evaluation.</p>
    <div class="sub-grid" id="sub-grid">
        <button class="sub-btn" id="btn-Malayalam" onclick="startQuiz('Malayalam')">Malayalam</button>
        <button class="sub-btn" id="btn-English" onclick="startQuiz('English')">English</button>
        <button class="sub-btn" id="btn-Maths" onclick="startQuiz('Maths')">Mathematics</button>
        <button class="sub-btn" id="btn-Science" onclick="startQuiz('Science')">Science</button>
        <button class="sub-btn" id="btn-Social" onclick="startQuiz('Social')">Social Studies</button>
    </div>
    <button id="final-res-btn" class="btn-action" style="display:none;" onclick="showFinalResult()">VIEW DETAILED REPORT 📊</button>
</div>

<!-- 3. IMMERSIVE QUIZ -->
<div class="glass-card" id="quiz-screen">
    <div style="display: flex; justify-content: space-between; margin-bottom: 20px;">
        <div class="stat-pill" id="cur-sub-title">SUBJECT</div>
        <div class="stat-pill" id="q-counter">0 / 10</div>
    </div>
    <div id="quiz-container"></div>
</div>

<!-- 4. PROFESSIONAL RESULT -->
<div class="glass-card" id="result-screen">
    <h1>Report Card</h1>
    <p id="student-meta" style="margin-bottom: 30px;"></p>
    <div id="result-rows-container"></div>
    <div id="overall-status" style="margin-top: 30px; font-size: 22px; font-weight: 800;"></div>
    <button class="btn-action" style="margin-top: 25px; background: rgba(255,255,255,0.05);" onclick="location.reload()">LOGOUT PORTAL</button>
</div>

<!-- REVIEW MODAL -->
<div class="modal" id="review-modal">
    <div class="modal-body">
        <h2 id="modal-sub" style="margin-top:0">Answer Key</h2>
        <div id="modal-content"></div>
        <button class="btn-action" onclick="closeModal()">CLOSE REPORT</button>
    </div>
</div>

<script>
    let student = { name: "", class: "" };
    let marks = {}; let userAnswers = {}; let currentSub = ""; let qIdx = 0;

    // 50 Questions Database (10 per subject)
    const questions = {
        'Malayalam': [
            { q: "മലയാളത്തിലെ ആദ്യ നോവൽ?", opts: ["ഇന്ദുലേഖ", "കുന്ദലത", "ശാരദ", "പാത്തുമ്മയുടെ ആട്"], a: "കുന്ദലത" },
            { q: "കേരളത്തിന്റെ മാമാങ്കം നടന്ന സ്ഥലം?", opts: ["തിരുനാവായ", "കൊച്ചി", "കോഴിക്കോട്", "പാലക്കാട്"], a: "തിരുനാവായ" },
            { q: "അക്ഷരമാലയിലെ ആദ്യ അക്ഷരം?", opts: ["അ", "ആ", "ക", "ഖ"], a: "അ" },
            { q: "കുമാരനാശാന്റെ പ്രസിദ്ധമായ കൃതി?", opts: ["വീണപൂവ്", "കൃഷ്ണഗാഥ", "രാമചരിതം", "നളചരിതം"], a: "വീണപൂവ്" },
            { q: "കേരളത്തിന്റെ ഔദ്യോഗിക ഭാഷ?", opts: ["മലയാളം", "തമിഴ്", "കന്നഡ", "ഹിന്ദി"], a: "മലയാളം" },
            { q: "ജ്ഞാനപീഠം ലഭിച്ച ആദ്യ മലയാളി?", opts: ["ജി. ശങ്കരക്കുറുപ്പ്", "എം.ടി", "തകഴി", "ബഷീർ"], a: "ജി. ശങ്കരക്കുറുപ്പ്" },
            { q: "മലയാള ഭാഷയുടെ പിതാവ്?", opts: ["എഴുത്തച്ഛൻ", "ചെറുശ്ശേരി", "കുഞ്ചൻ നമ്പ്യാർ", "പൂന്താനം"], a: "എഴുത്തച്ഛൻ" },
            { q: "മലയാളത്തിലെ ഏറ്റവും വലിയ അക്ഷരം?", opts: ["ക്ഷ", "ഹ", "റ", "ല"], a: "ക്ഷ" },
            { q: "ലക്ഷദ്വീപിലെ സംസാരഭാഷ?", opts: ["മലയാളം", "മഹൽ", "തമിഴ്", "ഹിന്ദി"], a: "മഹൽ" },
            { q: "മലയാളം സർവ്വകലാശാല എവിടെ?", opts: ["തിരൂർ", "കൊച്ചി", "കണ്ണൂർ", "കോട്ടയം"], a: "തിരൂർ" }
        ],
        'English': [
            { q: "Opposite of 'Happy'?", opts: ["Sad", "Joy", "Fast", "Angry"], a: "Sad" },
            { q: "Noun in 'The cat is sleeping'?", opts: ["Cat", "Sleeping", "The", "Is"], a: "Cat" },
            { q: "Plural of 'Tooth'?", opts: ["Teeth", "Tooths", "Teethes", "Toothies"], a: "Teeth" },
            { q: "Vowel count in 'Apple'?", opts: ["2", "3", "1", "0"], a: "2" },
            { q: "A person who treats patients?", opts: ["Doctor", "Teacher", "Pilot", "Farmer"], a: "Doctor" },
            { q: "Past tense of 'Go'?", opts: ["Went", "Gone", "Going", "Goes"], a: "Went" },
            { q: "Color of a leaf?", opts: ["Green", "Red", "Blue", "Black"], a: "Green" },
            { q: "Synonym of 'Start'?", opts: ["Begin", "End", "Stop", "Close"], a: "Begin" },
            { q: "Which is a fruit?", opts: ["Mango", "Carrot", "Potato", "Onion"], a: "Mango" },
            { q: "Animal with a long trunk?", opts: ["Elephant", "Lion", "Tiger", "Dog"], a: "Elephant" }
        ],
        'Maths': [
            { q: "10 x 5 = ?", opts: ["50", "40", "60", "100"], a: "50" },
            { q: "Square root of 64?", opts: ["8", "7", "6", "9"], a: "8" },
            { q: "Smallest prime number?", opts: ["2", "1", "3", "5"], a: "2" },
            { q: "15 + 25 = ?", opts: ["40", "30", "50", "45"], a: "40" },
            { q: "Angles in a triangle?", opts: ["3", "4", "2", "5"], a: "3" },
            { q: "100 / 4 = ?", opts: ["25", "20", "50", "10"], a: "25" },
            { q: "5 x 0 = ?", opts: ["0", "5", "1", "10"], a: "0" },
            { q: "Value of Pi (approx)?", opts: ["3.14", "2.14", "1.14", "4.14"], a: "3.14" },
            { q: "How many centimeters in 1 meter?", opts: ["100", "10", "1000", "50"], a: "100" },
            { q: "Next number: 2, 4, 6, 8, ...", opts: ["10", "12", "11", "9"], a: "10" }
        ],
        'Science': [
            { q: "Powerhouse of the cell?", opts: ["Mitochondria", "Nucleus", "Ribosome", "Wall"], a: "Mitochondria" },
            { q: "Water formula?", opts: ["H2O", "CO2", "O2", "NaCl"], a: "H2O" },
            { q: "Largest organ in the body?", opts: ["Skin", "Liver", "Heart", "Brain"], a: "Skin" },
            { q: "Gas we breathe in?", opts: ["Oxygen", "Nitrogen", "Hydrogen", "CO2"], a: "Oxygen" },
            { q: "Planet known as Red Planet?", opts: ["Mars", "Jupiter", "Venus", "Saturn"], a: "Mars" },
            { q: "Boiling point of water?", opts: ["100°C", "0°C", "50°C", "200°C"], a: "100°C" },
            { q: "Vitamin from Sunlight?", opts: ["Vitamin D", "Vitamin A", "Vitamin C", "Vitamin B"], a: "Vitamin D" },
            { q: "Force that pulls us to Earth?", opts: ["Gravity", "Friction", "Magnetic", "Electric"], a: "Gravity" },
            { q: "Number of bones in adult body?", opts: ["206", "300", "150", "250"], a: "206" },
            { q: "Largest mammal?", opts: ["Blue Whale", "Elephant", "Giraffe", "Shark"], a: "Blue Whale" }
        ],
        'Social': [
            { q: "First PM of India?", opts: ["Nehru", "Gandhi", "Ambedkar", "Azad"], a: "Nehru" },
            { q: "Father of Indian Constitution?", opts: ["Ambedkar", "Nehru", "Gandhi", "Patel"], a: "Ambedkar" },
            { q: "Capital of Kerala?", opts: ["Trivandrum", "Kochi", "Calicut", "Kannur"], a: "Trivandrum" },
            { q: "Independence Day?", opts: ["Aug 15", "Jan 26", "Oct 2", "Nov 14"], a: "Aug 15" },
            { q: "National Fruit of India?", opts: ["Mango", "Apple", "Banana", "Orange"], a: "Mango" },
            { q: "Largest Continent?", opts: ["Asia", "Africa", "Europe", "America"], a: "Asia" },
            { q: "State known as God's own country?", opts: ["Kerala", "Goa", "Punjab", "Assam"], a: "Kerala" },
            { q: "Highest mountain in world?", opts: ["Everest", "K2", "Anamudi", "Himalaya"], a: "Everest" },
            { q: "Currency of India?", opts: ["Rupee", "Dollar", "Yen", "Euro"], a: "Rupee" },
            { q: "National Animal?", opts: ["Tiger", "Lion", "Elephant", "Leopard"], a: "Tiger" }
        ]
    };

    function showSubjects() {
        student.name = document.getElementById('s-name').value;
        student.class = document.getElementById('s-class').value;
        if(!student.name || !student.class) return alert("Please enter all details.");
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('subject-screen').style.display = 'block';
        document.getElementById('welcome-msg').innerText = `Welcome, ${student.name}`;
    }

    function startQuiz(sub) {
        currentSub = sub; qIdx = 0; marks[sub] = 0; userAnswers[sub] = [];
        document.getElementById('subject-screen').style.display = 'none';
        document.getElementById('quiz-screen').style.display = 'block';
        document.getElementById('cur-sub-title').innerText = sub.toUpperCase();
        loadQ();
    }

    function loadQ() {
        const subQs = questions[currentSub];
        if(qIdx >= subQs.length) { finishSub(); return; }
        document.getElementById('q-counter').innerText = `${qIdx+1} / 10`;
        const item = subQs[qIdx];
        document.getElementById('quiz-container').innerHTML = `
            <div class="q-text">${item.q}</div>
            <div style="display: grid; gap: 12px;">
                ${item.opts.map(o => `<button class="sub-btn" style="padding:15px; text-align:left;" onclick="check('${o}')">${o}</button>`).join('')}
            </div>
        `;
    }

    function check(sel) {
        userAnswers[currentSub].push(sel);
        if(sel === questions[currentSub][qIdx].a) marks[currentSub]++;
        qIdx++; loadQ();
    }

    function finishSub() {
        document.getElementById('btn-' + currentSub).disabled = true;
        document.getElementById('btn-' + currentSub).style.background = "rgba(16, 185, 129, 0.1)";
        document.getElementById('quiz-screen').style.display = 'none';
        document.getElementById('subject-screen').style.display = 'block';
        if(Object.keys(marks).length === 5) document.getElementById('final-res-btn').style.display = 'block';
    }

    function showFinalResult() {
        document.getElementById('subject-screen').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        document.getElementById('student-meta').innerText = `${student.name} | Class ${student.class}`;
        let container = document.getElementById('result-rows-container'); container.innerHTML = "";
        let allPass = true;

        for(let s in questions) {
            let m = marks[s] || 0; let pct = (m/10)*100;
            if(m < 5) allPass = false;
            container.innerHTML += `
                <div class="result-row">
                    <div class="res-info">
                        <span class="res-sub">${s}</span>
                        <div class="res-bar-bg"><div class="res-bar-fill" style="width:${pct}%"></div></div>
                        <small style="color:#94a3b8">${m}/10 Marks</small>
                    </div>
                    <button class="btn-review" onclick="openReview('${s}')">Review Result</button>
                </div>`;
        }
        document.getElementById('overall-status').innerHTML = allPass ? 
            "<span style='color:var(--success)'>QUALIFIED 🏆</span>" : "<span style='color:var(--danger)'>RE-ATTEMPT REQUIRED ❌</span>";
    }

    function openReview(sub) {
        document.getElementById('review-modal').style.display = 'block';
        document.getElementById('modal-sub').innerText = `${sub} - Answer Key`;
        let content = "";
        questions[sub].forEach((q, i) => {
            let uAns = userAnswers[sub][i]; let correct = q.a;
            content += `
                <div class="review-box">
                    <div style="font-weight:700; margin-bottom:10px;">${i+1}. ${q.q}</div>
                    <div style="font-size:14px; color:${uAns===correct?'var(--success)':'var(--danger)'}">Your: ${uAns}</div>
                    ${uAns!==correct ? `<div style="font-size:14px; color:var(--success)">Correct: ${correct}</div>` : ""}
                </div>`;
        });
        document.getElementById('modal-content').innerHTML = content;
    }

    function closeModal() { document.getElementById('review-modal').style.display = 'none'; }
</script>
</body>
</html>
