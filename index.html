<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kids Online Exam Portal</title>
    <style>
        /* കുട്ടികൾക്ക് ഇഷ്ടപ്പെടുന്ന നിറങ്ങൾ */
        :root {
            --primary: #6c5ce7;
            --secondary: #a29bfe;
            --success: #00b894;
            --bg: #f0f3f9;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .exam-card {
            max-width: 600px;
            width: 100%;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            animation: fadeIn 0.8s ease-in;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { color: var(--primary); margin: 0; font-size: 24px; }
        .header p { color: #636e72; font-size: 14px; }

        /* പ്രോഗ്രസ് ബാർ */
        .progress-container {
            background: #eee;
            height: 10px;
            border-radius: 10px;
            margin-bottom: 30px;
            overflow: hidden;
        }
        #progress-bar {
            background: linear-gradient(to right, var(--secondary), var(--primary));
            height: 100%;
            width: 0%;
            transition: 0.5s ease;
        }

        .question-item {
            display: none; /* ഓരോന്നായി കാണിക്കാൻ */
            animation: slideIn 0.4s ease-out;
        }
        .question-item.active { display: block; }

        @keyframes slideIn { from { opacity: 0; margin-left: 20px; } to { opacity: 1; margin-left: 0; } }

        .q-text { font-size: 18px; font-weight: bold; margin-bottom: 20px; color: #2d3436; }

        .options-grid { display: grid; gap: 12px; }

        .opt-btn {
            background: #f8f9fa;
            border: 2px solid #edf2f7;
            padding: 15px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 16px;
            text-align: left;
            transition: 0.2s;
            color: #4a4a4a;
        }

        .opt-btn:hover { background: #f1f3ff; border-color: var(--secondary); }
        .opt-btn.selected { background: var(--primary); color: white; border-color: var(--primary); }

        .footer { margin-top: 30px; text-align: right; }
        
        #finish-screen { display: none; text-align: center; padding: 40px 20px; }
        .success-icon { font-size: 60px; color: var(--success); margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="exam-card" id="main-card">
    <div class="header">
        <h1>സ്കൂൾ പരീക്ഷ 📝</h1>
        <p id="q-count">ചോദ്യം 1 / 10</p>
    </div>

    <div class="progress-container">
        <div id="progress-bar"></div>
    </div>

    <div id="quiz-container">
        <!-- ചോദ്യങ്ങൾ ഇവിടെ ലോഡ് ചെയ്യും -->
    </div>

    <div class="footer">
        <small style="color: #b2bec3;">ഉത്തരം നൽകി കഴിഞ്ഞാൽ അടുത്ത ചോദ്യം വരും</small>
    </div>
</div>

<div class="exam-card" id="finish-screen">
    <div class="success-icon">🎉</div>
    <h2>പരീക്ഷ പൂർത്തിയായി!</h2>
    <p>നീ എല്ലാ ചോദ്യങ്ങൾക്കും ഉത്തരം നൽകി. മിടുക്കൻ/മിടുക്കി!</p>
    <button onclick="location.reload()" style="padding: 10px 20px; border-radius: 8px; border: none; background: var(--primary); color: white; cursor: pointer;">വീണ്ടും എഴുതുക</button>
</div>

<script>
    const questions = [
        { q: "1. കേരളത്തിലെ ഏറ്റവും വലിയ ജില്ല ഏതാണ്?", options: ["ഇടുക്കി", "പാലക്കാട്", "മലപ്പുറം", "വയനാട്"] },
        { q: "2. ഇന്ത്യയുടെ ദേശീയ പക്ഷി ഏതാണ്?", options: ["കുയിൽ", "മയിൽ", "തത്ത", "പ്രാവ്"] },
        { q: "3. 'രണ്ടാം കേരള സിംഹം' എന്നറിയപ്പെടുന്നത് ആര്?", options: ["പഴശ്ശിരാജ", "വേലുത്തമ്പി ദളവ", "കുഞ്ഞാലി മരക്കാർ", "സി. വി. രാമൻ പിള്ള"] },
        { q: "4. സസ്യങ്ങൾ ആഹാരം നിർമ്മിക്കുന്ന പ്രക്രിയ ഏത്?", options: ["ശ്വസനം", "പ്രകാശസംശ്ലേഷണം", "ബാഷ്പീകരണം", "വിസരണം"] },
        { q: "5. മലയാളത്തിലെ ആദ്യത്തെ നോവൽ ഏതാണ്?", options: ["ഇന്ദുലേഖ", "കുന്ദലത", "ശാരദ", "രാമരാജബഹദൂർ"] },
        { q: "6. സൂര്യപ്രകാശത്തിൽ നിന്നും ലഭിക്കുന്ന വിറ്റാമിൻ ഏത്?", options: ["വിറ്റാമിൻ A", "വിറ്റാമിൻ C", "വിറ്റാമിൻ D", "വിറ്റാമിൻ B"] },
        { q: "7. ലോക പരിസ്ഥിതി ദിനം എന്ന്?", options: ["ജൂൺ 5", "ജൂലൈ 5", "ജൂൺ 15", "ജൂലൈ 15"] },
        { q: "8. ഇന്ത്യയുടെ ദേശീയ ഗാനം രചിച്ചത് ആര്?", options: ["ഗാന്ധിജി", "നെഹ്റു", "ടാഗോർ", "തിലകൻ"] },
        { q: "9. വായുവിൽ ഏറ്റവും കൂടുതൽ അടങ്ങിയിട്ടുള്ള വാതകം?", options: ["ഓക്സിജൻ", "നൈട്രജൻ", "ഹൈഡ്രജൻ", "കാർബൺ ഡയോക്സൈഡ്"] },
        { q: "10. കേരളത്തിന്റെ സംസ്ഥാന മൃഗം ഏത്?", options: ["കടുവ", "ആന", "പശു", "മാൻ"] }
    ];

    let currentIdx = 0;
    const quizContainer = document.getElementById('quiz-container');

    function loadQuestion() {
        if (currentIdx >= questions.length) {
            showFinish();
            return;
        }

        document.getElementById('q-count').innerText = `ചോദ്യം ${currentIdx + 1} / ${questions.length}`;
        const progress = ((currentIdx) / questions.length) * 100;
        document.getElementById('progress-bar').style.width = progress + '%';

        const item = questions[currentIdx];
        let html = `
            <div class="question-item active">
                <div class="q-text">${item.q}</div>
                <div class="options-grid">
                    ${item.options.map(opt => `<button class="opt-btn" onclick="nextStep(this)">${opt}</button>`).join('')}
                </div>
            </div>
        `;
        quizContainer.innerHTML = html;
    }

    function nextStep(btn) {
        btn.classList.add('selected');
        // ഒരു ചെറിയ സമയം നൽകുന്നു (ബട്ടൺ സെലക്ട് ആയത് കാണാൻ)
        setTimeout(() => {
            currentIdx++;
            loadQuestion();
        }, 400);
    }

    function showFinish() {
        document.getElementById('progress-bar').style.width = '100%';
        document.getElementById('main-card').style.display = 'none';
        document.getElementById('finish-screen').style.display = 'block';
    }

    // ആദ്യ ചോദ്യം ലോഡ് ചെയ്യുന്നു
    loadQuestion();
</script>

</body>
</html>
