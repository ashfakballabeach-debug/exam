<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Subject Exam Portal</title>
    <style>
        :root { --primary: #4f46e5; --secondary: #ec4899; --bg: #eef2ff; --glass: rgba(255, 255, 255, 0.95); }
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { max-width: 600px; width: 100%; background: var(--glass); padding: 40px; border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.2); animation: slideUp 0.6s ease-out; text-align: center; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Subject Grid */
        .subject-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .sub-btn { padding: 20px; border-radius: 15px; border: none; background: white; cursor: pointer; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.05); transition: 0.3s; font-size: 16px; border-bottom: 4px solid var(--primary); }
        .sub-btn:hover { transform: translateY(-5px); background: #f8faff; }
        .sub-btn.completed { opacity: 0.6; border-bottom-color: #10b981; }

        /* Existing Styles */
        input { width: 100%; padding: 16px; border: 2px solid #e2e8f0; border-radius: 12px; margin-bottom: 15px; box-sizing: border-box; }
        .btn-main { width: 100%; padding: 18px; background: linear-gradient(to right, var(--primary), var(--secondary)); color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; }
        .info-dashboard { display: flex; gap: 10px; margin-bottom: 20px; }
        .info-box { flex: 1; padding: 10px; background: white; border-radius: 12px; border-bottom: 3px solid var(--primary); font-size: 14px; }
        .opt-btn { width: 100%; background: white; border: 2px solid #f1f5f9; padding: 15px; border-radius: 12px; cursor: pointer; margin-bottom: 10px; text-align: left; }
        .opt-btn.selected { background: var(--primary); color: white; }
        #subject-section, #quiz-section, #finish-screen { display: none; }
    </style>
</head>
<body>

<!-- 1. ലോഗിൻ -->
<div class="card" id="login-section">
    <h1>🚀 Exam Portal</h1>
    <input type="text" id="student-name" placeholder="പേര് (Student Name)">
    <input type="text" id="student-class" placeholder="ക്ലാസ്സ് (Class)">
    <button class="btn-main" onclick="goToSubjects()">തുടങ്ങാം</button>
</div>

<!-- 2. സബ്ജക്ട് സെലക്ഷൻ -->
<div class="card" id="subject-section">
    <h2>വിഷയം തിരഞ്ഞെടുക്കുക</h2>
    <div class="subject-grid">
        <button class="sub-btn" id="btn-mal" onclick="startQuiz('Malayalam')">Malayalam</button>
        <button class="sub-btn" id="btn-eng" onclick="startQuiz('English')">English</button>
        <button class="sub-btn" id="btn-mat" onclick="startQuiz('Maths')">Maths</button>
        <button class="sub-btn" id="btn-sci" onclick="startQuiz('Science')">Science</button>
        <button class="sub-btn" id="btn-soc" onclick="startQuiz('Social')">Social</button>
    </div>
</div>

<!-- 3. പരീക്ഷാ സ്ക്രീൻ -->
<div class="card" id="quiz-section">
    <div class="info-dashboard">
        <div class="info-box"><small>STUDENT</small><br><b id="disp-name"></b></div>
        <div class="info-box"><small>SUBJECT</small><br><b id="disp-sub"></b></div>
    </div>
    <div id="quiz-container"></div>
</div>

<!-- 4. ഫിനിഷ് സ്ക്രീൻ -->
<div class="card" id="finish-screen">
    <h1>🎉 Done!</h1>
    <p>ഈ വിഷയം പൂർത്തിയായി.</p>
    <button class="btn-main" onclick="goToSubjects()">അടുത്ത വിഷയം തിരഞ്ഞെടുക്കൂ</button>
</div>

<script>
    let studentName = "", studentClass = "", currentSubject = "";
    let completedSubjects = [];

    // ചോദ്യങ്ങൾ ഇവിടെ വിഷയങ്ങൾ തിരിച്ചു നൽകാം
    const allQuestions = {
        'Malayalam': [
            { q: "മലയാളത്തിലെ ആദ്യത്തെ നോവൽ?", options: ["ഇന്ദുലേഖ", "കുന്ദലത", "ശാരദ"] },
            { q: "കേരള സിംഹം എന്നറിയപ്പെടുന്നത്?", options: ["പഴശ്ശിരാജ", "വേലുത്തമ്പി", "ദളവ"] }
        ],
        'English': [
            { q: "Opposite of 'Happy'?", options: ["Sad", "Joy", "Angry"] },
            { q: "Noun in 'The cat sat'?", options: ["Cat", "Sat", "The"] }
        ],
        'Maths': [ { q: "10 + 15 = ?", options: ["25", "30", "20"] } ],
        'Science': [ { q: "Powerhouse of cell?", options: ["Mitochondria", "Nucleus", "Ribosome"] } ],
        'Social': [ { q: "First PM of India?", options: ["Nehru", "Gandhi", "Ambedkar"] } ]
    };

    function goToSubjects() {
        studentName = document.getElementById('student-name').value;
        studentClass = document.getElementById('student-class').value;
        if(!studentName) return alert("പേര് നൽകുക");

        document.getElementById('login-section').style.display = 'none';
        document.getElementById('finish-screen').style.display = 'none';
        document.getElementById('subject-section').style.display = 'block';
        document.getElementById('quiz-section').style.display = 'none';
    }

    let qIdx = 0;
    function startQuiz(sub) {
        currentSubject = sub;
        qIdx = 0;
        document.getElementById('subject-section').style.display = 'none';
        document.getElementById('quiz-section').style.display = 'block';
        document.getElementById('disp-name').innerText = studentName;
        document.getElementById('disp-sub').innerText = sub;
        loadQuestion();
    }

    function loadQuestion() {
        const questions = allQuestions[currentSubject];
        if(qIdx >= questions.length) {
            showSubjectFinish();
            return;
        }
        const item = questions[qIdx];
        document.getElementById('quiz-container').innerHTML = `
            <h3>${item.q}</h3>
            ${item.options.map(opt => `<button class="opt-btn" onclick="nextQ(this)">${opt}</button>`).join('')}
        `;
    }

    function nextQ(btn) {
        btn.classList.add('selected');
        setTimeout(() => { qIdx++; loadQuestion(); }, 500);
    }

    function showSubjectFinish() {
        document.getElementById('quiz-section').style.display = 'none';
        document.getElementById('finish-screen').style.display = 'block';
        // മാർക്ക് സബ്ജക്ട് ആസ് കംപ്ലീറ്റഡ്
        completedSubjects.push(currentSubject);
        // സബ്ജക്ട് ബട്ടൺ കളർ മാറ്റാൻ (optional logic here)
    }
</script>
</body>
</html>
