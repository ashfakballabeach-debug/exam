<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kids Online Exam Portal</title>
    <style>
        :root { --primary: #6c5ce7; --secondary: #a29bfe; --success: #00b894; --bg: #f0f3f9; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: var(--bg); margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        .exam-card { max-width: 500px; width: 100%; background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); text-align: center; }
        
        /* ലോഗിൻ സ്റ്റൈൽ */
        .input-group { margin-bottom: 20px; text-align: left; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: var(--primary); }
        input { width: 100%; padding: 12px; border: 2px solid #edf2f7; border-radius: 10px; font-size: 16px; box-sizing: border-box; }
        .start-btn { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 12px; font-size: 18px; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .start-btn:hover { background: #5649c0; }

        /* പരീക്ഷാ ഭാഗം */
        #quiz-section { display: none; }
        .progress-container { background: #eee; height: 8px; border-radius: 10px; margin: 20px 0; overflow: hidden; }
        #progress-bar { background: var(--primary); height: 100%; width: 0%; transition: 0.4s; }
        .q-text { font-size: 20px; font-weight: bold; margin-bottom: 20px; color: #2d3436; }
        .options-grid { display: grid; gap: 12px; }
        .opt-btn { background: #f8f9fa; border: 2px solid #edf2f7; padding: 15px; border-radius: 12px; cursor: pointer; font-size: 16px; text-align: left; transition: 0.2s; }
        .opt-btn:hover { background: #f1f3ff; border-color: var(--secondary); }
        .opt-btn.selected { background: var(--primary); color: white; }

        #finish-screen { display: none; }
        .success-icon { font-size: 60px; margin-bottom: 20px; }
    </style>
</head>
<body>

<!-- ലോഗിൻ സ്ക്രീൻ -->
<div class="exam-card" id="login-section">
    <h1 style="color: var(--primary);">സ്വാഗതം! 🎓</h1>
    <p>തുടങ്ങുന്നതിനായി താഴെ വിവരങ്ങൾ നൽകുക</p>
    <div class="input-group">
        <label>പേര് (First Name)</label>
        <input type="text" id="student-name" placeholder="പേര് ടൈപ്പ് ചെയ്യുക">
    </div>
    <div class="input-group">
        <label>ക്ലാസ്സ് (Class)</label>
        <input type="text" id="student-class" placeholder="ക്ലാസ്സ് നൽകുക">
    </div>
    <button class="start-btn" onclick="startExam()">പരീക്ഷ തുടങ്ങാം</button>
</div>

<!-- പരീക്ഷാ സ്ക്രീൻ -->
<div class="exam-card" id="quiz-section">
    <div style="display: flex; justify-content: space-between; font-size: 14px; color: #636e72;">
        <span id="display-name"></span>
        <span id="q-count">1 / 10</span>
    </div>
    <div class="progress-container">
        <div id="progress-bar"></div>
    </div>
    <div id="quiz-container"></div>
</div>

<!-- ഫിനിഷ് സ്ക്രീൻ -->
<div class="exam-card" id="finish-screen">
    <div class="success-icon">🎉</div>
    <h2 id="congrats-msg">മിടുക്കാ!</h2>
    <p>നീ പരീക്ഷ വിജയകരമായി പൂർത്തിയാക്കി.</p>
    <button class="start-btn" onclick="location.reload()">വീണ്ടും എഴുതുക</button>
</div>

<script>
    const questions = [
        { q: "1. കേരളത്തിലെ ഏറ്റവും വലിയ ജില്ല?", options: ["ഇടുക്കി", "പാലക്കാട്", "മലപ്പുറം", "വയനാട്"] },
        { q: "2. ഇന്ത്യയുടെ ദേശീയ പക്ഷി?", options: ["കുയിൽ", "മയിൽ", "തത്ത", "പ്രാവ്"] },
        { q: "3. 'രണ്ടാം കേരള സിംഹം' ആര്?", options: ["പഴശ്ശിരാജ", "വേലുത്തമ്പി ദളവ", "കുഞ്ഞാലി മരക്കാർ", "സി. വി. രാമൻ പിള്ള"] },
        { q: "4. സസ്യങ്ങൾ ആഹാരം നിർമ്മിക്കുന്ന പ്രക്രിയ?", options: ["ശ്വസനം", "പ്രകാശസംശ്ലേഷണം", "ബാഷ്പീകരണം", "വിസരണം"] },
        { q: "5. മലയാളത്തിലെ ആദ്യത്തെ നോവൽ?", options: ["ഇന്ദുലേഖ", "കുന്ദലത", "ശാരദ", "രാമരാജബഹദൂർ"] },
        { q: "6. സൂര്യപ്രകാശത്തിൽ നിന്നും ലഭിക്കുന്ന വിറ്റാമിൻ?", options: ["A", "C", "D", "B"] },
        { q: "7. ലോക പരിസ്ഥിതി ദിനം എന്ന്?", options: ["ജൂൺ 5", "ജൂലൈ 5", "ജൂൺ 15", "ജൂലൈ 15"] },
        { q: "8. ഇന്ത്യയുടെ ദേശീയ ഗാനം രചിച്ചത്?", options: ["ഗാന്ധിജി", "നെഹ്റു", "ടാഗോർ", "തിലകൻ"] },
        { q: "9. വായുവിൽ ഏറ്റവും കൂടുതലുള്ള വാതകം?", options: ["ഓക്സിജൻ", "നൈട്രജൻ", "ഹൈഡ്രജൻ", "കാർബൺ ഡയോക്സൈഡ്"] },
        { q: "10. കേരളത്തിന്റെ സംസ്ഥാന മൃഗം?", options: ["കടുവ", "ആന", "പശു", "മാൻ"] }
    ];

    let currentIdx = 0;

    function startExam() {
        const name = document.getElementById('student-name').value;
        const sClass = document.getElementById('student-class').value;

        if (name === "" || sClass === "") {
            alert("ദയവായി പേരും ക്ലാസ്സും നൽകുക!");
            return;
        }

        document.getElementById('display-name').innerText = `${name} (Class: ${sClass})`;
        document.getElementById('login-section').style.display = 'none';
        document.getElementById('quiz-section').style.display = 'block';
        loadQuestion();
    }

    function loadQuestion() {
        if (currentIdx >= questions.length) {
            showFinish();
            return;
        }

        document.getElementById('q-count').innerText = `${currentIdx + 1} / ${questions.length}`;
        document.getElementById('progress-bar').style.width = (currentIdx / questions.length) * 100 + '%';

        const item = questions[currentIdx];
        document.getElementById('quiz-container').innerHTML = `
            <div class="q-text">${item.q}</div>
            <div class="options-grid">
                ${item.options.map(opt => `<button class="opt-btn" onclick="nextStep(this)">${opt}</button>`).join('')}
            </div>
        `;
    }

    function nextStep(btn) {
        btn.classList.add('selected');
        setTimeout(() => {
            currentIdx++;
            loadQuestion();
        }, 400);
    }

    function showFinish() {
        document.getElementById('quiz-section').style.display = 'none';
        document.getElementById('finish-screen').style.display = 'block';
        const name = document.getElementById('student-name').value;
        document.getElementById('congrats-msg').innerText = `മിടുക്കൻ/മിടുക്കി ${name}!`;
    }
</script>

</body>
</html>
