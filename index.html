<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Exam | Professional Results</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root {
            --primary: #00f2fe; --secondary: #4facfe; --accent: #ff0080;
            --bg: #0b0e14; --card-bg: rgba(23, 25, 35, 0.9);
            --text: #ffffff; --success: #00ff88; --danger: #ff4d4d;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg);
            background-image: radial-gradient(circle at 10% 20%, rgba(0, 242, 254, 0.1) 0%, transparent 40%);
            margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; color: var(--text);
        }

        .glass-card {
            max-width: 750px; width: 100%; background: var(--card-bg);
            backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px; border-radius: 35px; box-shadow: 0 40px 100px rgba(0,0,0,0.6);
            animation: slideIn 0.7s ease-out; text-align: center;
        }

        @keyframes slideIn { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }

        h1 { font-size: 32px; font-weight: 800; background: linear-gradient(to right, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 10px; }
        
        /* Result Table Design */
        .result-headline { font-size: 24px; font-weight: 800; color: var(--primary); margin-bottom: 20px; text-transform: uppercase; border-bottom: 2px solid rgba(0, 242, 254, 0.2); padding-bottom: 10px; }
        
        table { width: 100%; border-collapse: separate; border-spacing: 0 10px; margin-top: 10px; }
        th { text-align: left; padding: 15px; color: var(--secondary); font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }
        td { padding: 15px; background: rgba(255, 255, 255, 0.03); border-top: 1px solid rgba(255, 255, 255, 0.05); }
        td:first-child { border-radius: 12px 0 0 12px; font-weight: 600; text-align: left; }
        td:nth-child(2) { font-weight: 700; color: #fff; text-align: center; }
        td:last-child { border-radius: 0 12px 12px 0; text-align: right; }

        .btn-main { width: 100%; padding: 18px; border: none; border-radius: 12px; background: linear-gradient(45deg, var(--secondary), var(--primary)); color: #0b0e14; font-weight: 800; cursor: pointer; transition: 0.3s; margin-top: 20px; }
        .btn-review { padding: 8px 15px; background: transparent; border: 1px solid var(--primary); color: var(--primary); border-radius: 8px; cursor: pointer; font-size: 11px; font-weight: 800; transition: 0.2s; }
        .btn-review:hover { background: var(--primary); color: #000; }

        /* Other sections hidden */
        #login-screen, #subject-screen, #quiz-screen, #result-screen { display: none; }
        
        /* Subject/Quiz Buttons */
        .sub-btn { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); padding: 20px; border-radius: 15px; color: white; cursor: pointer; margin-bottom: 10px; width: 100%; text-align: left; transition: 0.3s; }
        .sub-btn:hover:not(:disabled) { border-color: var(--primary); background: rgba(0, 242, 254, 0.05); }
        .sub-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 20px 0; }
        
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 999; padding: 20px; overflow-y: auto; }
        .modal-card { max-width: 600px; margin: 40px auto; background: #13161d; padding: 30px; border-radius: 25px; border: 1px solid var(--primary); }
    </style>
</head>
<body>

<!-- 1. LOGIN -->
<div class="glass-card" id="login-screen" style="display: block;">
    <h1>Quantum Exam</h1>
    <p>എക്സാം പോർട്ടലിലേക്ക് സ്വാഗതം</p>
    <input type="text" id="s-name" placeholder="Student Name" style="width:100%; padding:15px; border-radius:10px; border:1px solid #444; background:#222; color:#fff; margin-bottom:10px;">
    <input type="text" id="s-class" placeholder="Class" style="width:100%; padding:15px; border-radius:10px; border:1px solid #444; background:#222; color:#fff; margin-bottom:10px;">
    <button class="btn-main" onclick="showSubjects()">START</button>
</div>

<!-- 2. HUB -->
<div class="glass-card" id="subject-screen">
    <h1>Dashboard</h1>
    <div class="sub-grid" id="sub-buttons">
        <button class="sub-btn" id="btn-Malayalam" onclick="startQuiz('Malayalam')">Malayalam</button>
        <button class="sub-btn" id="btn-English" onclick="startQuiz('English')">English</button>
        <button class="sub-btn" id="btn-Maths" onclick="startQuiz('Maths')">Mathematics</button>
        <button class="sub-btn" id="btn-Science" onclick="startQuiz('Science')">Science</button>
        <button class="sub-btn" id="btn-Social" onclick="startQuiz('Social')">Social Studies</button>
    </div>
    <button id="final-res-btn" class="btn-main" style="display:none;" onclick="showFinalResult()">VIEW FINAL RESULT 📊</button>
</div>

<!-- 3. QUIZ -->
<div class="glass-card" id="quiz-screen">
    <div id="quiz-header" style="display:flex; justify-content:space-between; color:var(--primary); margin-bottom:20px; font-weight:bold;">
        <span id="cur-sub-display">SUBJECT</span>
        <span id="q-counter">1/10</span>
    </div>
    <div id="quiz-container"></div>
</div>

<!-- 4. FINAL RESULT (Updated with Headline and Table) -->
<div class="glass-card" id="result-screen">
    <div class="result-headline">Official Exam Report 📜</div>
    <div id="student-meta" style="margin-bottom: 20px; font-weight: bold; color: var(--secondary);"></div>
    
    <table>
        <thead>
            <tr>
                <th>Subject</th>
                <th style="text-align: center;">Mark</th>
                <th style="text-align: right;">Review</th>
            </tr>
        </thead>
        <tbody id="result-table-body">
            <!-- Results will load here -->
        </tbody>
    </table>

    <div id="overall-status" style="margin-top:25px; font-weight:800; font-size:24px;"></div>
    <button class="btn-main" style="background: rgba(255,255,255,0.05); color:#fff;" onclick="location.reload()">LOGOUT</button>
</div>

<!-- MODAL -->
<div class="modal" id="review-modal">
    <div class="modal-card">
        <h2 id="modal-title" style="color:var(--primary); margin-top:0;">Answer Key</h2>
        <div id="modal-content" style="text-align: left;"></div>
        <button class="btn-main" onclick="closeModal()">CLOSE</button>
    </div>
</div>

<script>
    let student = { name: "", class: "" };
    let marks = {}; let userAnswers = {}; let currentSub = ""; let qIdx = 0;

    const questions = {
        'Malayalam': [
            { q: "മലയാളത്തിലെ ആദ്യ നോവൽ?", opts: ["ഇന്ദുലേഖ", "കുന്ദലത", "ശാരദ", "പാത്തുമ്മയുടെ ആട്"], a: "കുന്ദലത" },
            { q: "കേരളത്തിന്റെ മാമാങ്കം നടന്ന സ്ഥലം?", opts: ["തിരുനാവായ", "കൊച്ചി", "കോഴിക്കോട്", "പാലക്കാട്"], a: "തിരുനാവായ" },
            { q: "അക്ഷരമാലയിലെ ആദ്യ അക്ഷരം?", opts: ["അ", "ആ", "ക", "ഖ"], a: "അ" },
            { q: "കുമാരനാശാന്റെ പ്രസിദ്ധമായ കൃതി?", opts: ["വീണപൂവ്", "കൃഷ്ണഗാഥ", "രാമചരിതം", "നളചരിതം"], a: "വീണപൂവ്" },
            { q: "കേരളത്തിന്റെ ഔദ്യോഗിക ഭാഷ?", opts: ["മലയാളം", "തമിഴ്", "കന്നഡ", "ഹിന്ദി"], a: "മലയാളം" },
            { q: "ജ്ഞാനപീഠം ലഭിച്ച ആദ്യ മലയാളി?", opts: ["ജി. ശങ്കരക്കുറുപ്പ്", "എം.ടി", "തകഴി", "ബഷീർ"], a: "ജി. ശങ്കരക്കുറുപ്പ്" },
            { q: "മലയാള ഭാഷയുടെ പിതാവ്?", opts: ["എഴുത്തച്ഛൻ", "ചെറുശ്ശേരി", "കുঞ্চൻ നമ്പ്യാർ", "പൂന്താനം"], a: "എഴുത്തച്ഛൻ" },
            { q: "മലയാളത്തിലെ ഏറ്റവും വലിയ അക്ഷരം?", opts: ["ക്ഷ", "ഹ", "റ", "ല"], a: "ക്ഷ" },
            { q: "ലക്ഷദ്വീപിലെ സംസാരഭാഷ?", opts: ["മലയാളം", "മഹൽ", "തമിഴ്", "ഹിന്ദി"], a: "മഹൽ" },
            { q: "മലയാളം സർവ്വകലാശാല എവിടെ?", opts: ["തിരൂർ", "കൊച്ചി", "കണ്ണൂർ", "കോട്ടയം"], a: "തിരൂർ" }
        ],
        'English': [
            { q: "Opposite of 'Happy'?", opts: ["Sad", "Joy", "Fast", "Angry"], a: "Sad" },
            { q: "Noun in 'The cat is sleeping'?", opts: ["Cat", "Sleeping", "The", "Is"], a: "Cat" },
            { q: "Plural of 'Tooth'?", opts: ["Teeth", "Tooths", "Teethes", "Toothies"], a: "Teeth" },
            { q: "Vowel count in 'Apple'?", opts: ["2", "3", "1", "0"], a: "2" },
            { q: "A person who treats patients?", opts: ["Doctor", "Teacher", "Pilot", "Farmer"], a: "Doctor" },
            { q: "Past tense of 'Go'?", opts: ["Went", "Gone", "Going", "Goes"], a: "Went" },
            { q: "Color of a leaf?", opts: ["Green", "Red", "Blue", "Black"], a: "Green" },
            { q: "Synonym of 'Start'?", opts: ["Begin", "End", "Stop", "Close"], a: "Begin" },
            { q: "Which is a fruit?", opts: ["Mango", "Carrot", "Potato", "Onion"], a: "Mango" },
            { q: "Animal with a long trunk?", opts: ["Elephant", "Lion", "Tiger", "Dog"], a: "Elephant" }
        ],
        'Maths': [
            { q: "10 x 5 = ?", opts: ["50", "40", "60", "100"], a: "50" },
            { q: "Square root of 64?", opts: ["8", "7", "6", "9"], a: "8" },
            { q: "Smallest prime number?", opts: ["2", "1", "3", "5"], a: "2" },
            { q: "15 + 25 = ?", opts: ["40", "30", "50", "45"], a: "40" },
            { q: "Angles in a triangle?", opts: ["3", "4", "2", "5"], a: "3" },
            { q: "100 / 4 = ?", opts: ["25", "20", "50", "10"], a: "25" },
            { q: "5 x 0 = ?", opts: ["0", "5", "1", "10"], a: "0" },
            { q: "Value of Pi (approx)?", opts: ["3.14", "2.14", "1.14", "4.14"], a: "3.14" },
            { q: "How many centimeters in 1 meter?", opts: ["100", "10", "1000", "50"], a: "100" },
            { q: "Next number: 2, 4, 6, 8, ...", opts: ["10", "12", "11", "9"], a: "10" }
        ],
        'Science': [
            { q: "Powerhouse of the cell?", opts: ["Mitochondria", "Nucleus", "Ribosome", "Wall"], a: "Mitochondria" },
            { q: "Water formula?", opts: ["H2O", "CO2", "O2", "NaCl"], a: "H2O" },
            { q: "Largest organ in the body?", opts: ["Skin", "Liver", "Heart", "Brain"], a: "Skin" },
            { q: "Gas we breathe in?", opts: ["Oxygen", "Nitrogen", "Hydrogen", "CO2"], a: "Oxygen" },
            { q: "Planet known as Red Planet?", opts: ["Mars", "Jupiter", "Venus", "Saturn"], a: "Mars" },
            { q: "Boiling point of water?", opts: ["100°C", "0°C", "50°C", "200°C"], a: "100°C" },
            { q: "Vitamin from Sunlight?", opts: ["Vitamin D", "Vitamin A", "Vitamin C", "Vitamin B"], a: "Vitamin D" },
            { q: "Force that pulls us to Earth?", opts: ["Gravity", "Friction", "Magnetic", "Electric"], a: "Gravity" },
            { q: "Number of bones in adult body?", opts: ["206", "300", "150", "250"], a: "206" },
            { q: "Largest mammal?", opts: ["Blue Whale", "Elephant", "Giraffe", "Shark"], a: "Blue Whale" }
        ],
        'Social': [
            { q: "First PM of India?", opts: ["Nehru", "Gandhi", "Ambedkar", "Azad"], a: "Nehru" },
            { q: "Father of Indian Constitution?", opts: ["Ambedkar", "Nehru", "Gandhi", "Patel"], a: "Ambedkar" },
            { q: "Capital of Kerala?", opts: ["Trivandrum", "Kochi", "Calicut", "Kannur"], a: "Trivandrum" },
            { q: "Independence Day?", opts: ["Aug 15", "Jan 26", "Oct 2", "Nov 14"], a: "Aug 15" },
            { q: "National Fruit of India?", opts: ["Mango", "Apple", "Banana", "Orange"], a: "Mango" },
            { q: "Largest Continent?", opts: ["Asia", "Africa", "Europe", "America"], a: "Asia" },
            { q: "State known as God's own country?", opts: ["Kerala", "Goa", "Punjab", "Assam"], a: "Kerala" },
            { q: "Highest mountain in world?", opts: ["Everest", "K2", "Anamudi", "Himalaya"], a: "Everest" },
            { q: "Currency of India?", opts: ["Rupee", "Dollar", "Yen", "Euro"], a: "Rupee" },
            { q: "National Animal?", opts: ["Tiger", "Lion", "Elephant", "Leopard"], a: "Tiger" }
        ]
    };

    function showSubjects() {
        student.name = document.getElementById('s-name').value;
        student.class = document.getElementById('s-class').value;
        if(!student.name || !student.class) return alert("ദയവായി വിവരങ്ങൾ നൽകുക!");
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('subject-screen').style.display = 'block';
    }

    function startQuiz(sub) {
        currentSub = sub; qIdx = 0; marks[sub] = 0; userAnswers[sub] = [];
        document.getElementById('subject-screen').style.display = 'none';
        document.getElementById('quiz-screen').style.display = 'block';
        document.getElementById('cur-sub-display').innerText = sub.toUpperCase();
        loadQ();
    }

    function loadQ() {
        const subQs = questions[currentSub];
        if(qIdx >= subQs.length) { finishSub(); return; }
        document.getElementById('q-counter').innerText = `${qIdx+1} / 10`;
        const item = subQs[qIdx];
        document.getElementById('quiz-container').innerHTML = `
            <div style="font-size:22px; font-weight:700; margin:25px 0; text-align:left;">${item.q}</div>
            <div style="display:grid; gap:12px;">
                ${item.opts.map(o => `<button class="sub-btn" style="text-align:left;" onclick="check('${o}')">${o}</button>`).join('')}
            </div>
        `;
    }

    function check(sel) {
        userAnswers[currentSub].push(sel);
        if(sel === questions[currentSub][qIdx].a) marks[currentSub]++;
        qIdx++; loadQ();
    }

    function finishSub() {
        document.getElementById('btn-' + currentSub).disabled = true;
        document.getElementById('btn-' + currentSub).style.opacity = "0.5";
        document.getElementById('quiz-screen').style.display = 'none';
        document.getElementById('subject-screen').style.display = 'block';
        if(Object.keys(marks).length === 5) document.getElementById('final-res-btn').style.display = 'block';
    }

    function showFinalResult() {
        document.getElementById('subject-screen').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        document.getElementById('student-meta').innerText = `${student.name.toUpperCase()} | CLASS: ${student.class}`;
        
        let html = ""; let allPass = true;
        for(let s in questions) {
            let m = marks[s] || 0; if(m < 5) allPass = false;
            html += `<tr>
                <td>${s}</td>
                <td style="text-align:center;">${m}/10</td>
                <td style="text-align:right;"><button class="btn-review" onclick="openReview('${s}')">REVIEW</button></td>
            </tr>`;
        }
        document.getElementById('result-table-body').innerHTML = html;
        document.getElementById('overall-status').innerHTML = allPass ? 
            "<span style='color:var(--success)'>QUALIFIED 🏆</span>" : 
            "<span style='color:var(--danger)'>RE-ATTEMPT ❌</span>";
    }

    function openReview(sub) {
        document.getElementById('review-modal').style.display = 'block';
        document.getElementById('modal-title').innerText = `${sub} - Key`;
        let content = "";
        questions[sub].forEach((q, i) => {
            let uAns = userAnswers[sub][i]; let correct = q.a;
            content += `<div style="padding:15px; border-bottom:1px solid #333;">
                <div style="font-weight:bold; margin-bottom:5px;">${i+1}. ${q.q}</div>
                <div style="font-size:14px; color:${uAns===correct?'var(--success)':'var(--danger)'}">Your: ${uAns}</div>
                ${uAns!==correct ? `<div style="font-size:14px; color:var(--success)">Correct: ${correct}</div>` : ""}
            </div>`;
        });
        document.getElementById('modal-content').innerHTML = content;
    }

    function closeModal() { document.getElementById('review-modal').style.display = 'none'; }
</script>

</body>
</html>
