<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Multi-Subject Exam</title>
    <style>
        :root { --primary: #4338ca; --secondary: #db2777; --bg: #f8fafc; --success: #059669; --danger: #dc2626; }
        body { font-family: 'Inter', sans-serif; background: #eef2ff; margin: 0; padding: 20px; display: flex; justify-content: center; min-height: 100vh; }
        .card { max-width: 700px; width: 100%; background: white; padding: 40px; border-radius: 24px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); text-align: center; align-self: center; }
        .sub-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 25px 0; }
        .sub-btn { padding: 18px; border-radius: 12px; border: 2px solid #e2e8f0; background: #fff; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .sub-btn:hover:not(:disabled) { border-color: var(--primary); background: #f1f5f9; transform: translateY(-2px); }
        .sub-btn:disabled { background: #f1f5f9; color: #94a3b8; cursor: not-allowed; border-color: var(--success); }
        .btn-main { width: 100%; padding: 16px; background: linear-gradient(to right, var(--primary), var(--secondary)); color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 16px; }
        input { width: 100%; padding: 14px; border: 2px solid #e2e8f0; border-radius: 10px; margin-bottom: 15px; font-size: 16px; box-sizing: border-box; }
        .info-bar { display: flex; justify-content: space-between; background: #f8fafc; padding: 12px; border-radius: 10px; margin-bottom: 20px; font-size: 14px; border-left: 5px solid var(--primary); }
        .q-text { font-size: 20px; font-weight: 700; text-align: left; margin-bottom: 20px; color: #1e293b; }
        .opt-btn { width: 100%; text-align: left; padding: 15px; margin-bottom: 10px; border: 1.5px solid #e2e8f0; border-radius: 12px; background: white; cursor: pointer; transition: 0.2s; }
        .opt-btn:hover { border-color: var(--primary); background: #f8faff; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; border: 1px solid #e2e8f0; text-align: center; }
        .pass { color: var(--success); font-weight: bold; }
        .fail { color: var(--danger); font-weight: bold; }
        #subject-screen, #quiz-screen, #result-screen { display: none; }
    </style>
</head>
<body>

<!-- ലോഗിൻ -->
<div class="card" id="login-screen">
    <h1 style="color: var(--primary);">🎓 പരീക്ഷാ പോർട്ടൽ</h1>
    <input type="text" id="s-name" placeholder="പേര് (Full Name)">
    <input type="text" id="s-class" placeholder="ക്ലാസ്സ് (Class)">
    <button class="btn-main" onclick="showSubjects()">പ്രവേശിക്കുക</button>
</div>

<!-- വിഷയം തിരഞ്ഞെടുക്കൽ -->
<div class="card" id="subject-screen">
    <h2 id="welcome-msg">ഹലോ!</h2>
    <div class="sub-grid">
        <button class="sub-btn" id="btn-Malayalam" onclick="startQuiz('Malayalam')">Malayalam</button>
        <button class="sub-btn" id="btn-English" onclick="startQuiz('English')">English</button>
        <button class="sub-btn" id="btn-Maths" onclick="startQuiz('Maths')">Maths</button>
        <button class="sub-btn" id="btn-Science" onclick="startQuiz('Science')">Science</button>
        <button class="sub-btn" id="btn-Social" onclick="startQuiz('Social')">Social</button>
    </div>
    <button id="final-res-btn" class="btn-main" style="display:none; background: var(--success);" onclick="showFinalResult()">VIEW RESULT 📜</button>
</div>

<!-- പരീക്ഷാ ഭാഗം -->
<div class="card" id="quiz-screen">
    <div class="info-bar">
        <span>വിഷയം: <b id="cur-sub"></b></span>
        <span>ചോദ്യം: <b id="q-count">0/10</b></span>
    </div>
    <div id="quiz-container"></div>
</div>

<!-- റിസൾട്ട് -->
<div class="card" id="result-screen">
    <h2 style="color: var(--primary);">പരീക്ഷാ ഫലം</h2>
    <p id="student-meta"></p>
    <table>
        <thead><tr><th>വിഷയം</th><th>മാർക്ക്</th><th>ഫലം</th></tr></thead>
        <tbody id="result-body"></tbody>
    </table>
    <h3 id="overall-msg" style="margin-top:25px;"></h3>
    <button class="btn-main" onclick="location.reload()">RESTART</button>
</div>

<script>
    let student = { name: "", class: "" };
    let marks = {};
    let currentSub = "";
    let qIdx = 0;

    const questions = {
        'Malayalam': [
            { q: "മലയാളത്തിലെ ആദ്യ നോവൽ?", opts: ["ഇന്ദുലേഖ", "കുന്ദലത", "ശാരദ", "രാമരാജബഹദൂർ"], a: "കുന്ദലത" },
            { q: "കേരളത്തിന്റെ മാമാങ്കം നടന്ന സ്ഥലം?", opts: ["തിരുനാവായ", "കൊച്ചി", "കോഴിക്കോട്", "പാലക്കാട്"], a: "തിരുനാവായ" },
            { q: "അക്ഷരമാലയിലെ ആദ്യ അക്ഷരം?", opts: ["അ", "ആ", "ക", "ഖ"], a: "അ" },
            { q: "കുമാരനാശാന്റെ പ്രസിദ്ധമായ കൃതി?", opts: ["വീണപൂവ്", "കൃഷ്ണഗാഥ", "രാമചരിതം", "നളചരിതം"], a: "വീണപൂവ്" },
            { q: "കേരളത്തിന്റെ ഔദ്യോഗിക ഭാഷ?", opts: ["മലയാളം", "തമിഴ്", "കന്നഡ", "ഹിന്ദി"], a: "മലയാളം" },
            { q: "ജ്ഞാനപീഠം ലഭിച്ച ആദ്യ മലയാളി?", opts: ["ജി. ശങ്കരക്കുറുപ്പ്", "എം.ടി", "തകഴി", "ബഷീർ"], a: "ജി. ശങ്കരക്കുറുപ്പ്" },
            { q: "മലയാള ഭാഷയുടെ പിതാവ്?", opts: ["എഴുത്തച്ഛൻ", "ചെറുശ്ശേരി", "കുഞ്ചൻ നമ്പ്യാർ", "പൂന്താനം"], a: "എഴുത്തച്ഛൻ" },
            { q: "മലയാളത്തിലെ ഏറ്റവും വലിയ അക്ഷരം?", opts: ["ക്ഷ", "ഹ", "റ", "ല"], a: "ക്ഷ" },
            { q: "ലക്ഷദ്വീപിലെ സംസാരഭാഷ?", opts: ["മലയാളം", "മഹൽ", "തമിഴ്", "ഹിന്ദി"], a: "മഹൽ" },
            { q: "മലയാളം സർവ്വകലാശാല എവിടെ?", opts: ["തിരൂർ", "കൊച്ചി", "കണ്ണൂർ", "കോട്ടയം"], a: "തിരൂർ" }
        ],
        'English': [
            { q: "Opposite of 'Happy'?", opts: ["Sad", "Joy", "Fast", "Angry"], a: "Sad" },
            { q: "Noun in 'The cat is sleeping'?", opts: ["Cat", "Sleeping", "The", "Is"], a: "Cat" },
            { q: "Plural of 'Tooth'?", opts: ["Teeth", "Tooths", "Teethes", "Toothies"], a: "Teeth" },
            { q: "Vowel count in 'Apple'?", opts: ["2", "3", "1", "0"], a: "2" },
            { q: "A person who treats patients?", opts: ["Doctor", "Teacher", "Pilot", "Farmer"], a: "Doctor" },
            { q: "Past tense of 'Go'?", opts: ["Went", "Gone", "Going", "Goes"], a: "Went" },
            { q: "Color of a leaf?", opts: ["Green", "Red", "Blue", "Black"], a: "Green" },
            { q: "Synonym of 'Start'?", opts: ["Begin", "End", "Stop", "Close"], a: "Begin" },
            { q: "Which is a fruit?", opts: ["Mango", "Carrot", "Potato", "Onion"], a: "Mango" },
            { q: "Animal with a long trunk?", opts: ["Elephant", "Lion", "Tiger", "Dog"], a: "Elephant" }
        ],
        'Maths': [
            { q: "10 x 5 = ?", opts: ["50", "40", "60", "100"], a: "50" },
            { q: "Square root of 64?", opts: ["8", "7", "6", "9"], a: "8" },
            { q: "Smallest prime number?", opts: ["2", "1", "3", "5"], a: "2" },
            { q: "15 + 25 = ?", opts: ["40", "30", "50", "45"], a: "40" },
            { q: "Angles in a triangle?", opts: ["3", "4", "2", "5"], a: "3" },
            { q: "100 / 4 = ?", opts: ["25", "20", "50", "10"], a: "25" },
            { q: "5 x 0 = ?", opts: ["0", "5", "1", "10"], a: "0" },
            { q: "Value of Pi (approx)?", opts: ["3.14", "2.14", "1.14", "4.14"], a: "3.14" },
            { q: "How many centimeters in 1 meter?", opts: ["100", "10", "1000", "50"], a: "100" },
            { q: "Next number: 2, 4, 6, 8, ...", opts: ["10", "12", "11", "9"], a: "10" }
        ],
        'Science': [
            { q: "Powerhouse of the cell?", opts: ["Mitochondria", "Nucleus", "Ribosome", "Wall"], a: "Mitochondria" },
            { q: "Water formula?", opts: ["H2O", "CO2", "O2", "NaCl"], a: "H2O" },
            { q: "Largest organ in the body?", opts: ["Skin", "Liver", "Heart", "Brain"], a: "Skin" },
            { q: "Gas we breathe in?", opts: ["Oxygen", "Nitrogen", "Hydrogen", "CO2"], a: "Oxygen" },
            { q: "Planet known as Red Planet?", opts: ["Mars", "Jupiter", "Venus", "Saturn"], a: "Mars" },
            { q: "Boiling point of water?", opts: ["100°C", "0°C", "50°C", "200°C"], a: "100°C" },
            { q: "Vitamin from Sunlight?", opts: ["Vitamin D", "Vitamin A", "Vitamin C", "Vitamin B"], a: "Vitamin D" },
            { q: "Force that pulls us to Earth?", opts: ["Gravity", "Friction", "Magnetic", "Electric"], a: "Gravity" },
            { q: "Number of bones in adult body?", opts: ["206", "300", "150", "250"], a: "206" },
            { q: "Largest mammal?", opts: ["Blue Whale", "Elephant", "Giraffe", "Shark"], a: "Blue Whale" }
        ],
        'Social': [
            { q: "First PM of India?", opts: ["Nehru", "Gandhi", "Ambedkar", "Azad"], a: "Nehru" },
            { q: "Father of Indian Constitution?", opts: ["Ambedkar", "Nehru", "Gandhi", "Patel"], a: "Ambedkar" },
            { q: "Capital of Kerala?", opts: ["Trivandrum", "Kochi", "Calicut", "Kannur"], a: "Trivandrum" },
            { q: "Independence Day?", opts: ["Aug 15", "Jan 26", "Oct 2", "Nov 14"], a: "Aug 15" },
            { q: "National Fruit of India?", opts: ["Mango", "Apple", "Banana", "Orange"], a: "Mango" },
            { q: "Largest Continent?", opts: ["Asia", "Africa", "Europe", "America"], a: "Asia" },
            { q: "State known as God's own country?", opts: ["Kerala", "Goa", "Punjab", "Assam"], a: "Kerala" },
            { q: "Highest mountain in world?", opts: ["Everest", "K2", "Anamudi", "Himalaya"], a: "Everest" },
            { q: "Currency of India?", opts: ["Rupee", "Dollar", "Yen", "Euro"], a: "Rupee" },
            { q: "National Animal?", opts: ["Tiger", "Lion", "Elephant", "Leopard"], a: "Tiger" }
        ]
    };

    function showSubjects() {
        student.name = document.getElementById('s-name').value;
        student.class = document.getElementById('s-class').value;
        if(!student.name || !student.class) return alert("വിവരങ്ങൾ നൽകുക!");
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('subject-screen').style.display = 'block';
        document.getElementById('welcome-msg').innerText = `ഹലോ, ${student.name}!`;
    }

    function startQuiz(sub) {
        currentSub = sub;
        qIdx = 0;
        marks[sub] = 0;
        document.getElementById('subject-screen').style.display = 'none';
        document.getElementById('quiz-screen').style.display = 'block';
        document.getElementById('cur-sub').innerText = sub;
        loadQ();
    }

    function loadQ() {
        const subQs = questions[currentSub];
        if(qIdx >= subQs.length) { finishSub(); return; }
        document.getElementById('q-count').innerText = `${qIdx+1}/10`;
        const item = subQs[qIdx];
        document.getElementById('quiz-container').innerHTML = `
            <div class="q-text">${item.q}</div>
            ${item.opts.map(o => `<button class="opt-btn" onclick="check('${o}')">${o}</button>`).join('')}
        `;
    }

    function check(sel) {
        if(sel === questions[currentSub][qIdx].a) marks[currentSub]++;
        qIdx++;
        loadQ();
    }

    function finishSub() {
        document.getElementById('btn-' + currentSub).disabled = true;
        document.getElementById('btn-' + currentSub).innerText = currentSub + " (✅)";
        document.getElementById('quiz-screen').style.display = 'none';
        document.getElementById('subject-screen').style.display = 'block';
        if(Object.keys(marks).length === 5) document.getElementById('final-res-btn').style.display = 'block';
    }

    function showFinalResult() {
        document.getElementById('subject-screen').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        document.getElementById('student-meta').innerText = `${student.name} | Class: ${student.class}`;
        let html = ""; let allPass = true;
        for(let s in questions) {
            let m = marks[s] || 0;
            let status = m >= 5 ? "PASS" : "FAIL";
            if(status === "FAIL") allPass = false;
            html += `<tr><td>${s}</td><td>${m}/10</td><td class="${status.toLowerCase()}">${status}</td></tr>`;
        }
        document.getElementById('result-body').innerHTML = html;
        document.getElementById('overall-msg').innerHTML = allPass ? "<span class='pass'>എല്ലാ വിഷയത്തിലും വിജയിച്ചു! 🏆</span>" : "<span class='fail'>ചില വിഷയങ്ങളിൽ പരാജയപ്പെട്ടു. വീണ്ടും ശ്രമിക്കൂ!</span>";
    }
</script>
</body>
</html>
