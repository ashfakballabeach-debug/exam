<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Exam Portal | Multi-Subject</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root {
            --p-grad: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            --s-grad: linear-gradient(135deg, #f43f5e 0%, #fb923c 100%);
            --bg: #0f172a;
            --card-bg: rgba(255, 255, 255, 0.08);
            --text: #f8fafc;
            --success: #22c55e;
            --danger: #ef4444;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg);
            background-image: radial-gradient(circle at 10% 20%, rgba(99, 102, 241, 0.15) 0%, transparent 40%),
                              radial-gradient(circle at 90% 80%, rgba(236, 72, 153, 0.15) 0%, transparent 40%);
            margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; color: var(--text);
        }

        .glass-card {
            max-width: 650px; width: 100%; background: var(--card-bg);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px; border-radius: 32px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* Welcome Design */
        h1 { font-size: 32px; font-weight: 800; background: var(--p-grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 8px; }
        p { color: #94a3b8; margin-bottom: 30px; }

        input {
            width: 100%; padding: 18px; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px; color: white; font-size: 16px; margin-bottom: 15px; box-sizing: border-box; transition: 0.3s;
        }
        input:focus { outline: none; border-color: #6366f1; background: rgba(255, 255, 255, 0.1); }

        .btn-prime {
            width: 100%; padding: 18px; border: none; border-radius: 16px; background: var(--p-grad);
            color: white; font-weight: 700; font-size: 16px; cursor: pointer; transition: 0.3s;
        }
        .btn-prime:hover { transform: scale(1.02); box-shadow: 0 10px 20px -5px rgba(99, 102, 241, 0.5); }

        /* Dashboard Items */
        .sub-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 30px 0; }
        .sub-btn {
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 24px; border-radius: 20px; color: white; cursor: pointer; transition: 0.3s; font-weight: 600;
        }
        .sub-btn:hover:not(:disabled) { background: rgba(255, 255, 255, 0.08); border-color: #6366f1; transform: translateY(-5px); }
        .sub-btn:disabled { opacity: 0.4; border-color: var(--success); cursor: not-allowed; }

        /* Quiz Logic UI */
        .info-pill-container { display: flex; gap: 10px; margin-bottom: 25px; }
        .info-pill { background: rgba(255, 255, 255, 0.05); padding: 8px 16px; border-radius: 30px; font-size: 12px; font-weight: 600; color: #cbd5e1; border: 1px solid rgba(255, 255, 255, 0.05); }

        .q-area { text-align: left; }
        .q-text { font-size: 22px; font-weight: 700; margin-bottom: 25px; line-height: 1.4; color: #f1f5f9; }
        .opt-card {
            width: 100%; padding: 18px; margin-bottom: 12px; background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 16px; color: #cbd5e1;
            text-align: left; cursor: pointer; transition: 0.2s; font-size: 16px;
        }
        .opt-card:hover { background: rgba(255, 255, 255, 0.08); border-color: #6366f1; }
        
        /* Results Table */
        table { width: 100%; border-collapse: separate; border-spacing: 0 8px; margin-top: 20px; }
        th { text-align: left; padding: 12px; color: #64748b; font-size: 12px; text-transform: uppercase; }
        td { padding: 16px; background: rgba(255, 255, 255, 0.03); }
        td:first-child { border-radius: 12px 0 0 12px; }
        td:last-child { border-radius: 0 12px 12px 0; }

        #subject-screen, #quiz-screen, #result-screen { display: none; }
    </style>
</head>
<body>

<!-- Step 1: Elite Login -->
<div class="glass-card" id="login-screen">
    <div style="font-size: 48px; margin-bottom: 20px;">💎</div>
    <h1>Elite Exam Portal</h1>
    <p>Enter your credentials to access the examination.</p>
    <input type="text" id="s-name" placeholder="Full Name">
    <input type="text" id="s-class" placeholder="Class / Grade">
    <button class="btn-prime" onclick="showSubjects()">GET STARTED</button>
</div>

<!-- Step 2: Subject Hub -->
<div class="glass-card" id="subject-screen">
    <h2 id="welcome-msg" style="margin:0">Welcome back!</h2>
    <p>Select a subject to begin your 10-question assessment.</p>
    <div class="sub-grid">
        <button class="sub-btn" id="btn-Malayalam" onclick="startQuiz('Malayalam')">Malayalam</button>
        <button class="sub-btn" id="btn-English" onclick="startQuiz('English')">English</button>
        <button class="sub-btn" id="btn-Maths" onclick="startQuiz('Maths')">Mathematics</button>
        <button class="sub-btn" id="btn-Science" onclick="startQuiz('Science')">Science</button>
        <button class="sub-btn" id="btn-Social" onclick="startQuiz('Social')">Social Studies</button>
    </div>
    <button id="final-res-btn" class="btn-prime" style="display:none; background: var(--s-grad);" onclick="showFinalResult()">GENERATE FINAL REPORT 📊</button>
</div>

<!-- Step 3: Immersive Quiz -->
<div class="glass-card" id="quiz-screen">
    <div class="info-pill-container">
        <div class="info-pill" id="cur-sub">SUBJECT</div>
        <div class="info-pill" id="q-count">0/10</div>
    </div>
    <div class="q-area" id="quiz-container"></div>
</div>

<!-- Step 4: Final Analytics -->
<div class="glass-card" id="result-screen">
    <h2 style="margin:0">Examination Report</h2>
    <p id="student-meta"></p>
    <table>
        <thead><tr><th>Subject</th><th>Score</th><th>Result</th></tr></thead>
        <tbody id="result-body"></tbody>
    </table>
    <div id="overall-msg" style="margin-top:30px; font-weight: 800; font-size: 20px;"></div>
    <button class="btn-prime" style="margin-top:20px; background: rgba(255,255,255,0.1);" onclick="location.reload()">LOGOUT</button>
</div>

<script>
    let student = { name: "", class: "" };
    let marks = {};
    let currentSub = "";
    let qIdx = 0;

    const questions = {
        'Malayalam': [
            { q: "മലയാളത്തിലെ ആദ്യ നോവൽ?", opts: ["ഇന്ദുലേഖ", "കുന്ദലത", "ശാരദ", "രാമരാജബഹദൂർ"], a: "കുന്ദലത" },
            { q: "കേരളത്തിന്റെ മാമാങ്കം നടന്ന സ്ഥലം?", opts: ["തിരുനാവായ", "കൊച്ചി", "കോഴിക്കോട്", "പാലക്കാട്"], a: "തിരുനാവായ" },
            { q: "അക്ഷരമാലയിലെ ആദ്യ അക്ഷരം?", opts: ["അ", "ആ", "ക", "ഖ"], a: "അ" },
            { q: "കുമാരനാശാന്റെ പ്രസിദ്ധമായ കൃതി?", opts: ["വീണപൂവ്", "കൃഷ്ണഗാഥ", "രാമചരിതം", "നളചരിതം"], a: "വീണപൂവ്" },
            { q: "കേരളത്തിന്റെ ഔദ്യോഗിക ഭാഷ?", opts: ["മലയാളം", "തമിഴ്", "കന്നഡ", "ഹിന്ദി"], a: "മലയാളം" },
            { q: "ജ്ഞാനപീഠം ലഭിച്ച ആദ്യ മലയാളി?", opts: ["ജി. ശങ്കരക്കുറുപ്പ്", "എം.ടി", "തകഴി", "ബഷീർ"], a: "ജി. ശങ്കരക്കുറുപ്പ്" },
            { q: "മലയാള ഭാഷയുടെ പിതാവ്?", opts: ["എഴുത്തച്ഛൻ", "ചെറുശ്ശേരി", "കുഞ്ചൻ നമ്പ്യാർ", "പൂന്താനം"], a: "എഴുത്തച്ഛൻ" },
            { q: "മലയാളത്തിലെ ഏറ്റവും വലിയ അക്ഷരം?", opts: ["ക്ഷ", "ഹ", "റ", "ല"], a: "ക്ഷ" },
            { q: "ലക്ഷദ്വീപിലെ സംസാരഭാഷ?", opts: ["മലയാളം", "മഹൽ", "തമിഴ്", "ഹിന്ദി"], a: "മഹൽ" },
            { q: "മലയാളം സർവ്വകലാശാല എവിടെ?", opts: ["തിരൂർ", "കൊച്ചി", "കണ്ണൂർ", "കോട്ടയം"], a: "തിരൂർ" }
        ],
        'English': [
            { q: "Opposite of 'Happy'?", opts: ["Sad", "Joy", "Fast", "Angry"], a: "Sad" },
            { q: "Noun in 'The cat is sleeping'?", opts: ["Cat", "Sleeping", "The", "Is"], a: "Cat" },
            { q: "Plural of 'Tooth'?", opts: ["Teeth", "Tooths", "Teethes", "Toothies"], a: "Teeth" },
            { q: "Vowel count in 'Apple'?", opts: ["2", "3", "1", "0"], a: "2" },
            { q: "A person who treats patients?", opts: ["Doctor", "Teacher", "Pilot", "Farmer"], a: "Doctor" },
            { q: "Past tense of 'Go'?", opts: ["Went", "Gone", "Going", "Goes"], a: "Went" },
            { q: "Color of a leaf?", opts: ["Green", "Red", "Blue", "Black"], a: "Green" },
            { q: "Synonym of 'Start'?", opts: ["Begin", "End", "Stop", "Close"], a: "Begin" },
            { q: "Which is a fruit?", opts: ["Mango", "Carrot", "Potato", "Onion"], a: "Mango" },
            { q: "Animal with a long trunk?", opts: ["Elephant", "Lion", "Tiger", "Dog"], a: "Elephant" }
        ],
        'Maths': [
            { q: "10 x 5 = ?", opts: ["50", "40", "60", "100"], a: "50" },
            { q: "Square root of 64?", opts: ["8", "7", "6", "9"], a: "8" },
            { q: "Smallest prime number?", opts: ["2", "1", "3", "5"], a: "2" },
            { q: "15 + 25 = ?", opts: ["40", "30", "50", "45"], a: "40" },
            { q: "Angles in a triangle?", opts: ["3", "4", "2", "5"], a: "3" },
            { q: "100 / 4 = ?", opts: ["25", "20", "50", "10"], a: "25" },
            { q: "5 x 0 = ?", opts: ["0", "5", "1", "10"], a: "0" },
            { q: "Value of Pi (approx)?", opts: ["3.14", "2.14", "1.14", "4.14"], a: "3.14" },
            { q: "How many centimeters in 1 meter?", opts: ["100", "10", "1000", "50"], a: "100" },
            { q: "Next number: 2, 4, 6, 8, ...", opts: ["10", "12", "11", "9"], a: "10" }
        ],
        'Science': [
            { q: "Powerhouse of the cell?", opts: ["Mitochondria", "Nucleus", "Ribosome", "Wall"], a: "Mitochondria" },
            { q: "Water formula?", opts: ["H2O", "CO2", "O2", "NaCl"], a: "H2O" },
            { q: "Largest organ in the body?", opts: ["Skin", "Liver", "Heart", "Brain"], a: "Skin" },
            { q: "Gas we breathe in?", opts: ["Oxygen", "Nitrogen", "Hydrogen", "CO2"], a: "Oxygen" },
            { q: "Planet known as Red Planet?", opts: ["Mars", "Jupiter", "Venus", "Saturn"], a: "Mars" },
            { q: "Boiling point of water?", opts: ["100°C", "0°C", "50°C", "200°C"], a: "100°C" },
            { q: "Vitamin from Sunlight?", opts: ["Vitamin D", "Vitamin A", "Vitamin C", "Vitamin B"], a: "Vitamin D" },
            { q: "Force that pulls us to Earth?", opts: ["Gravity", "Friction", "Magnetic", "Electric"], a: "Gravity" },
            { q: "Number of bones in adult body?", opts: ["206", "300", "150", "250"], a: "206" },
            { q: "Largest mammal?", opts: ["Blue Whale", "Elephant", "Giraffe", "Shark"], a: "Blue Whale" }
        ],
        'Social': [
            { q: "First PM of India?", opts: ["Nehru", "Gandhi", "Ambedkar", "Azad"], a: "Nehru" },
            { q: "Father of Indian Constitution?", opts: ["Ambedkar", "Nehru", "Gandhi", "Patel"], a: "Ambedkar" },
            { q: "Capital of Kerala?", opts: ["Trivandrum", "Kochi", "Calicut", "Kannur"], a: "Trivandrum" },
            { q: "Independence Day?", opts: ["Aug 15", "Jan 26", "Oct 2", "Nov 14"], a: "Aug 15" },
            { q: "National Fruit of India?", opts: ["Mango", "Apple", "Banana", "Orange"], a: "Mango" },
            { q: "Largest Continent?", opts: ["Asia", "Africa", "Europe", "America"], a: "Asia" },
            { q: "State known as God's own country?", opts: ["Kerala", "Goa", "Punjab", "Assam"], a: "Kerala" },
            { q: "Highest mountain in world?", opts: ["Everest", "K2", "Anamudi", "Himalaya"], a: "Everest" },
            { q: "Currency of India?", opts: ["Rupee", "Dollar", "Yen", "Euro"], a: "Rupee" },
            { q: "National Animal?", opts: ["Tiger", "Lion", "Elephant", "Leopard"], a: "Tiger" }
        ]
    };

    function showSubjects() {
        student.name = document.getElementById('s-name').value;
        student.class = document.getElementById('s-class').value;
        if(!student.name || !student.class) return alert("Enter Student Details!");
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('subject-screen').style.display = 'block';
        document.getElementById('welcome-msg').innerText = `Hello, ${student.name}!`;
    }

    function startQuiz(sub) {
        currentSub = sub; qIdx = 0; marks[sub] = 0;
        document.getElementById('subject-screen').style.display = 'none';
        document.getElementById('quiz-screen').style.display = 'block';
        document.getElementById('cur-sub').innerText = sub.toUpperCase();
        loadQ();
    }

    function loadQ() {
        const subQs = questions[currentSub];
        if(qIdx >= subQs.length) { finishSub(); return; }
        document.getElementById('q-count').innerText = `${qIdx+1} / 10`;
        const item = subQs[qIdx];
        document.getElementById('quiz-container').innerHTML = `
            <div class="q-text">${item.q}</div>
            ${item.opts.map(o => `<button class="opt-card" onclick="check('${o}')">${o}</button>`).join('')}
        `;
    }

    function check(sel) {
        if(sel === questions[currentSub][qIdx].a) marks[currentSub]++;
        qIdx++; loadQ();
    }

    function finishSub() {
        document.getElementById('btn-' + currentSub).disabled = true;
        document.getElementById('btn-' + currentSub).style.background = "rgba(34, 197, 94, 0.1)";
        document.getElementById('quiz-screen').style.display = 'none';
        document.getElementById('subject-screen').style.display = 'block';
        if(Object.keys(marks).length === 5) document.getElementById('final-res-btn').style.display = 'block';
    }

    function showFinalResult() {
        document.getElementById('subject-screen').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        document.getElementById('student-meta').innerText = `${student.name} | ${student.class}`;
        let html = ""; let allPass = true;
        for(let s in questions) {
            let m = marks[s] || 0; let status = m >= 5 ? "PASS" : "FAIL";
            if(status === "FAIL") allPass = false;
            html += `<tr><td>${s}</td><td>${m}/10</td><td style="color:${status==='PASS'?'#22c55e':'#ef4444'}">${status}</td></tr>`;
        }
        document.getElementById('result-body').innerHTML = html;
        document.getElementById('overall-msg').innerHTML = allPass ? "GRADUATED 🏆" : "NEED RE-ATTEMPT ❌";
    }
</script>
</body>
</html>
