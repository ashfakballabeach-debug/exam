<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Exam | Live Student Info</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root {
            --primary: #00f2fe; --secondary: #4facfe; --bg: #0b0e14;
            --card-bg: rgba(23, 25, 35, 0.9); --text: #ffffff;
            --success: #00ff88; --danger: #ff4d4d;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg);
            background-image: radial-gradient(circle at 10% 20%, rgba(0, 242, 254, 0.1) 0%, transparent 40%);
            margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; color: var(--text);
        }

        .glass-card {
            max-width: 800px; width: 100%; background: var(--card-bg);
            backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px; border-radius: 35px; box-shadow: 0 40px 100px rgba(0,0,0,0.6);
            animation: slideIn 0.7s ease-out; text-align: center;
        }

        @keyframes slideIn { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }

        /* LIVE STUDENT INFO BANNER */
        .live-info-banner {
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(0, 242, 254, 0.2);
            padding: 15px 25px; border-radius: 20px; margin-bottom: 25px; text-align: left;
        }
        .live-info-banner div span { display: block; font-size: 10px; color: var(--primary); text-transform: uppercase; font-weight: 800; letter-spacing: 1px; }
        .live-info-banner div strong { font-size: 16px; color: #fff; }

        .btn-main { width: 100%; padding: 18px; border: none; border-radius: 12px; background: linear-gradient(45deg, var(--secondary), var(--primary)); color: #0b0e14; font-weight: 800; cursor: pointer; transition: 0.3s; margin-top: 20px; }
        .sub-btn { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); padding: 18px; border-radius: 15px; color: white; cursor: pointer; margin-bottom: 10px; width: 100%; text-align: left; transition: 0.3s; font-size: 16px; }
        .sub-btn:hover:not(:disabled) { border-color: var(--primary); background: rgba(0, 242, 254, 0.05); }

        #login-screen, #subject-screen, #quiz-screen, #result-screen { display: none; }
        
        table { width: 100%; border-collapse: separate; border-spacing: 0 10px; margin-top: 10px; }
        td { padding: 15px; background: rgba(255, 255, 255, 0.03); }
        .pass-text { color: var(--success); font-weight: bold; }
        .fail-text { color: var(--danger); font-weight: bold; }
    </style>
</head>
<body>

<!-- 1. LOGIN -->
<div class="glass-card" id="login-screen" style="display: block;">
    <h1 style="color: var(--primary);">Quantum Exam</h1>
    <input type="text" id="s-name" placeholder="Student Name" style="width:100%; padding:16px; border-radius:12px; border:1px solid #444; background:#222; color:#fff; margin-bottom:15px;">
    <input type="text" id="s-class" placeholder="Class" style="width:100%; padding:16px; border-radius:12px; border:1px solid #444; background:#222; color:#fff; margin-bottom:15px;">
    <button class="btn-main" onclick="showSubjects()">START</button>
</div>

<!-- 2. SUBJECT HUB -->
<div class="glass-card" id="subject-screen">
    <h2>Dashboard</h2>
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 20px 0;">
        <button class="sub-btn" id="btn-Malayalam" onclick="startQuiz('Malayalam')">Malayalam</button>
        <button class="sub-btn" id="btn-English" onclick="startQuiz('English')">English</button>
        <button class="sub-btn" id="btn-Maths" onclick="startQuiz('Maths')">Maths</button>
        <button class="sub-btn" id="btn-Science" onclick="startQuiz('Science')">Science</button>
        <button class="sub-btn" id="btn-Social" onclick="startQuiz('Social')">Social</button>
    </div>
    <button id="final-res-btn" class="btn-main" style="display:none;" onclick="showFinalResult()">VIEW REPORT 📊</button>
</div>

<!-- 3. QUIZ SCREEN (Live Info Display) -->
<div class="glass-card" id="quiz-screen">
    <!-- LIVE STUDENT INFO -->
    <div class="live-info-banner">
        <div><span>Candidate</span><strong id="display-name">---</strong></div>
        <div style="text-align: right;"><span>Grade</span><strong id="display-class">---</strong></div>
    </div>

    <div style="display:flex; justify-content:space-between; color:var(--primary); margin-bottom:20px; font-weight:bold;">
        <span id="cur-sub-display">SUBJECT</span>
        <span id="q-counter">1/10</span>
    </div>
    <div id="quiz-container"></div>
</div>

<!-- 4. RESULT SCREEN -->
<div class="glass-card" id="result-screen">
    <h2 style="color: var(--primary);">Exam Report Card 📜</h2>
    <div id="student-meta" style="margin-bottom: 20px; font-weight: bold; color: var(--secondary);"></div>
    <table>
        <thead><tr><th>Subject</th><th>Mark</th><th>Result</th></tr></thead>
        <tbody id="result-table-body"></tbody>
    </table>
    <div id="overall-status" style="margin-top:25px; font-weight:800; font-size:24px;"></div>
    <button class="btn-main" onclick="location.reload()">LOGOUT</button>
</div>

<script>
    let student = { name: "", class: "" };
    let marks = {}; let currentSub = ""; let qIdx = 0;

    // Sample Questions (Add 10 for each)
    const questions = {
        'Malayalam': [ { q: "മലയാളത്തിലെ ആദ്യ നോവൽ?", opts: ["ഇന്ദുലേഖ", "കുന്ദലത", "ശാരദ"], a: "കുന്ദലത" } ],
        'English': [ { q: "Opposite of 'Happy'?", opts: ["Sad", "Joy", "Angry"], a: "Sad" } ],
        'Maths': [ { q: "10 x 5 = ?", opts: ["50", "40", "100"], a: "50" } ],
        'Science': [ { q: "Water formula?", opts: ["H2O", "CO2", "O2"], a: "H2O" } ],
        'Social': [ { q: "Capital of Kerala?", opts: ["Trivandrum", "Kochi", "Kannur"], a: "Trivandrum" } ]
    };

    function showSubjects() {
        student.name = document.getElementById('s-name').value;
        student.class = document.getElementById('s-class').value;
        if(!student.name || !student.class) return alert("Fill Details!");
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('subject-screen').style.display = 'block';
    }

    function startQuiz(sub) {
        currentSub = sub; qIdx = 0; marks[sub] = 0;
        document.getElementById('subject-screen').style.display = 'none';
        document.getElementById('quiz-screen').style.display = 'block';
        
        // DISPLAY NAME & CLASS IN QUIZ
        document.getElementById('display-name').innerText = student.name;
        document.getElementById('display-class').innerText = student.class;
        document.getElementById('cur-sub-display').innerText = sub.toUpperCase();
        loadQ();
    }

    function loadQ() {
        const subQs = questions[currentSub];
        if(qIdx >= subQs.length) { finishSub(); return; }
        document.getElementById('q-counter').innerText = `${qIdx+1}/${subQs.length}`;
        const item = subQs[qIdx];
        document.getElementById('quiz-container').innerHTML = `
            <div style="font-size:22px; font-weight:700; margin:25px 0; text-align:left;">${item.q}</div>
            ${item.opts.map(o => `<button class="sub-btn" onclick="check('${o}')">${o}</button>`).join('')}
        `;
    }

    function check(sel) {
        if(sel === questions[currentSub][qIdx].a) marks[currentSub]++;
        qIdx++; loadQ();
    }

    function finishSub() {
        document.getElementById('btn-' + currentSub).disabled = true;
        document.getElementById('quiz-screen').style.display = 'none';
        document.getElementById('subject-screen').style.display = 'block';
        if(Object.keys(marks).length === 5) document.getElementById('final-res-btn').style.display = 'block';
    }

    function showFinalResult() {
        document.getElementById('subject-screen').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        document.getElementById('student-meta').innerText = `${student.name.toUpperCase()} | CLASS: ${student.class}`;
        let html = ""; let allPass = true;
        for(let s in questions) {
            let m = marks[s] || 0; let status = (m >= 5) ? "PASS" : "FAIL";
            if(status === "FAIL") allPass = false;
            html += `<tr><td>${s}</td><td>${m}/10</td><td class="${status.toLowerCase()}-text">${status}</td></tr>`;
        }
        document.getElementById('result-table-body').innerHTML = html;
        document.getElementById('overall-status').innerHTML = allPass ? "<span style='color:var(--success)'>QUALIFIED 🏆</span>" : "<span style='color:var(--danger)'>RE-ATTEMPT ❌</span>";
    }
</script>
</body>
</html>
